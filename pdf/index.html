<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Annotator Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--sidebar:#1a1a1a;--surface:#242424;--surface-2:#2e2e2e;--border:#333;--text:#e8e8e8;--text-muted:#777;--accent:#f59e0b;--accent-hover:#d97706;--accent-glow:rgba(245,158,11,0.12);--danger:#ef4444;--success:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}

/* ── Upload ── */
#upload-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(circle at 20% 50%,rgba(245,158,11,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 50%,rgba(239,68,68,0.03) 0%,transparent 50%);}
.drop-zone{width:520px;max-width:90vw;padding:60px 40px;border:2px dashed var(--border);border-radius:20px;text-align:center;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;background:var(--surface);}
.drop-zone::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-glow),transparent);opacity:0;transition:opacity 0.3s;}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 40px rgba(245,158,11,0.08);}
.drop-zone:hover::before,.drop-zone.drag-over::before{opacity:1;}
.drop-zone i{font-size:48px;color:var(--accent);margin-bottom:20px;display:block;position:relative;}
.drop-zone h2{font-size:22px;font-weight:600;margin-bottom:8px;position:relative;}
.drop-zone p{color:var(--text-muted);font-size:14px;position:relative;}
.drop-zone .browse-btn{display:inline-block;margin-top:20px;padding:10px 28px;background:var(--accent);color:#000;font-weight:600;border-radius:10px;font-size:14px;position:relative;transition:background 0.2s;}
.drop-zone .browse-btn:hover{background:var(--accent-hover);}

/* ── App Shell ── */
#app{display:none;height:100vh;flex-direction:column;}
#app.active{display:flex;}

/* ── Toolbar ── */
.toolbar{height:50px;background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;}
.toolbar .logo{font-weight:700;font-size:15px;color:var(--accent);margin-right:12px;letter-spacing:-0.5px;white-space:nowrap;}
.toolbar .divider{width:1px;height:26px;background:var(--border);margin:0 3px;flex-shrink:0;}
.tb-btn{min-width:34px;height:34px;border:none;background:transparent;color:var(--text-muted);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s;position:relative;padding:0 6px;gap:5px;white-space:nowrap;}
.tb-btn:hover,.tb-btn.active{background:var(--surface-2);color:var(--text);}
.tb-btn.active{color:var(--accent);border:1px solid rgba(245,158,11,0.2);}
.tb-btn:active{transform:scale(0.93);}
.tb-btn.danger-btn:hover{background:rgba(239,68,68,0.12);color:var(--danger);}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:4px;}
[title]:hover::after{content:attr(title);position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);background:#222;color:#ddd;font-size:11px;padding:3px 7px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:9999;border:1px solid #444;}
[title]{position:relative;}

/* ── Content ── */
.content{display:flex;flex:1;overflow:hidden;}

/* ── Page Panel (left) ── */
.page-panel{width:130px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.page-panel-header{padding:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.page-panel-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);font-weight:600;}
.page-panel-actions{display:flex;gap:3px;}
.pp-btn{width:22px;height:22px;border:none;background:transparent;color:var(--text-muted);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.15s;}
.pp-btn:hover{background:var(--surface-2);color:var(--text);}
.pp-btn.danger:hover{color:var(--danger);}
.page-thumbs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
.page-thumbs::-webkit-scrollbar{width:4px;}
.page-thumbs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.page-thumb{position:relative;cursor:pointer;border-radius:5px;overflow:hidden;border:2px solid transparent;transition:all 0.15s;background:var(--surface);}
.page-thumb:hover{border-color:var(--text-muted);}
.page-thumb.active{border-color:var(--accent);}
.page-thumb canvas{display:block;width:100%;}
.page-thumb .thumb-num{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:9px;color:#aaa;background:rgba(0,0,0,0.6);padding:2px;}
.page-thumb .thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(239,68,68,0.85);border:none;border-radius:3px;color:#fff;font-size:8px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.page-thumb:hover .thumb-del{display:flex;}
.page-thumb-drag{opacity:0.5;border:2px dashed var(--accent)!important;}
.page-thumb-drop-over{border-color:var(--success)!important;}

/* ── Sidebar (right controls) - removed, moved to toolbar ── */
.sidebar{width:0;display:none;}

/* ── Color grid for highlight ── */
.color-grid{display:flex;gap:5px;flex-wrap:wrap;padding:4px 0;}
.color-swatch{width:22px;height:22px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all 0.15s;position:relative;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.active{border-color:#fff;box-shadow:0 0 0 1px var(--bg);}
.color-swatch.active::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;}

/* ── Highlight color popover ── */
.hl-popover{position:absolute;top:calc(100% + 6px);left:0;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:10px;z-index:600;box-shadow:0 8px 24px rgba(0,0,0,0.6);display:none;}
.hl-popover.open{display:block;}

/* ── Viewer ── */
.viewer-area{flex:1;overflow:auto!important;display:block;padding:24px;background:var(--bg);}
.viewer-area::-webkit-scrollbar{width:8px;height:8px;}
.viewer-area::-webkit-scrollbar-track{background:transparent;}
.viewer-area::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:4px;}
.page-container{position:relative;box-shadow:0 4px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.03);border-radius:4px;overflow:visible;flex-shrink:0;margin:0 auto;}
.page-container canvas{display:block;}

/* ── Text Layer ── */
.text-layer{position:absolute;text-align:initial;inset:0;overflow:hidden;opacity:0.22;line-height:1;-webkit-text-size-adjust:none;text-size-adjust:none;forced-color-adjust:none;transform-origin:0 0;}
.text-layer :is(span,br){color:transparent;position:absolute;white-space:pre;cursor:text;transform-origin:0% 0%;}
.tool-highlight .text-layer ::selection{background:rgba(245,158,11,0.45);}
.tool-highlight .text-layer{opacity:0.22;cursor:text;pointer-events:auto;}
.tool-hand .text-layer,.tool-text .text-layer,.tool-image .text-layer,.tool-symbol .text-layer{pointer-events:none;}
.tool-text .page-container,.tool-image .page-container,.tool-symbol .page-container{cursor:crosshair;}

/* ── Annotation Layer ── */
.annotation-layer{position:absolute;inset:0;pointer-events:none;overflow:visible;}
.hl-rect{position:absolute;border-radius:2px;pointer-events:none;mix-blend-mode:multiply;}

/* ── Text Annotation ── */
.text-annotation{position:absolute;pointer-events:auto;cursor:move;min-width:40px;background:transparent;border:1px solid transparent;padding:3px 5px;color:#000000;line-height:1.2;word-wrap:break-word;user-select:none;display:inline-block;}
.text-annotation:hover{border-color:rgba(0,0,0,0.25);background:rgba(0,0,0,0.03);}

/* ── Formatter Tooltip ── */
.text-formatter-tooltip{position:absolute;bottom:calc(100% + 10px);left:0;background:#111;border:1px solid #2a2a2a;border-radius:9px;padding:5px 8px;display:flex;align-items:center;gap:6px;box-shadow:0 4px 20px rgba(0,0,0,0.55);z-index:500;pointer-events:auto;white-space:nowrap;flex-wrap:nowrap;}
.text-formatter-tooltip::after{content:'';position:absolute;top:100%;left:14px;border-width:5px;border-style:solid;border-color:#111 transparent transparent transparent;}
.text-formatter-tooltip select{background:#222;color:#fff;font-size:12px;border:1px solid #333;border-radius:4px;padding:2px 20px 2px 6px;outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");background-repeat:no-repeat;background-position:right 6px center;}
.text-formatter-tooltip select.font-select{width:98px;}
.text-formatter-tooltip select.size-select{width:60px;}
.text-formatter-tooltip .divider{width:1px;height:16px;background:#333;margin:0 1px;flex-shrink:0;}
.text-formatter-tooltip .style-btn{background:transparent;border:none;color:#888;font-size:12px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;transition:all 0.1s;flex-shrink:0;}
.text-formatter-tooltip .style-btn:hover{background:#222;color:#fff;}
.text-formatter-tooltip .style-btn.active{color:#f59e0b;background:rgba(245,158,11,0.12);}
.text-formatter-tooltip .delete-btn{background:transparent;border:none;color:#666;font-size:12px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;transition:all 0.1s;flex-shrink:0;}
.text-formatter-tooltip .delete-btn:hover{background:rgba(239,68,68,0.15);color:#ef4444;}
.text-formatter-tooltip .color-picker-block{width:15px;height:15px;border-radius:3px;border:1px solid rgba(255,255,255,0.25);cursor:pointer;position:relative;flex-shrink:0;}

/* ── Color Popup ── */
.color-popup{position:absolute;bottom:calc(100% + 6px);left:0;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:9px;display:none;flex-direction:column;gap:7px;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,0.65);min-width:165px;}
.color-popup.open{display:flex;}
.color-popup-swatches{display:grid;grid-template-columns:repeat(6,22px);gap:4px;}
.color-popup-swatch{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s;}
.color-popup-swatch:hover{transform:scale(1.15);}
.color-popup-swatch.selected{border-color:#fff;}
.color-popup-native-row{display:flex;align-items:center;gap:6px;border-top:1px solid #333;padding-top:7px;font-size:11px;color:#888;}
.color-popup-native-row label{cursor:pointer;flex:1;}
.color-popup-native-input{width:22px;height:22px;border:none;padding:0;background:none;cursor:pointer;border-radius:3px;}

/* ── Symbol Annotation ── */
.symbol-annotation{position:absolute;pointer-events:auto;cursor:move;user-select:none;line-height:1;display:flex;align-items:center;justify-content:center;}
.symbol-annotation:hover .sym-del{display:flex;}
.sym-del{position:absolute;top:-8px;right:-8px;width:16px;height:16px;background:#ef4444;border:none;border-radius:50%;color:#fff;font-size:8px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:10;}

/* ── Symbol Picker Panel ── */
.symbol-picker{position:absolute;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:10px;z-index:600;box-shadow:0 8px 28px rgba(0,0,0,0.65);display:none;min-width:260px;}
.symbol-picker.open{display:block;}
.symbol-picker-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:8px;font-weight:600;}
.symbol-grid{display:grid;grid-template-columns:repeat(8,30px);gap:4px;}
.sym-btn{width:30px;height:30px;background:#222;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.1s;color:#ddd;}
.sym-btn:hover{background:#333;border-color:#555;transform:scale(1.1);}

/* ── Width Handle ── */
.text-width-handle{position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#f59e0b;border:2px solid #fff;cursor:e-resize;display:none;z-index:600;box-shadow:0 1px 4px rgba(0,0,0,0.4);pointer-events:auto;}
.text-annotation-editing .text-width-handle{display:block;}

/* ── Image nodes ── */
.image-annotation{position:absolute;pointer-events:auto;cursor:move;border:2px solid transparent;border-radius:5px;transition:border-color 0.15s;}
.image-annotation:hover{border-color:var(--accent);}
.image-annotation img{display:block;width:100%;height:100%;object-fit:fill;border-radius:3px;pointer-events:none;}
.image-annotation .ann-delete{position:absolute;top:-9px;right:-9px;width:20px;height:20px;border-radius:50%;background:var(--danger);color:#fff;border:2px solid var(--bg);font-size:8px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.image-annotation:hover .ann-delete{display:flex;}
.resize-handle{position:absolute;bottom:-5px;right:-5px;width:12px;height:12px;background:var(--accent);border-radius:2px;border:2px solid var(--bg);cursor:nwse-resize;display:none;}
.image-annotation:hover .resize-handle{display:block;}

/* ── Text Input ── */
.text-input-overlay-box{border:none!important;background:transparent!important;outline:none!important;padding:0!important;margin:0!important;color:inherit!important;font-family:inherit!important;font-size:inherit!important;font-weight:inherit!important;font-style:inherit!important;width:100%;display:inline-block;box-shadow:none!important;}
.hidden-input{display:none;}

/* ── Status Bar ── */
.status-bar{height:36px;background:var(--sidebar);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;font-size:12px;color:var(--text-muted);}
.status-bar .divider{width:1px;height:18px;background:var(--border);}
.status-btn{height:24px;min-width:24px;border:none;background:transparent;color:var(--text-muted);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0 5px;gap:4px;transition:all 0.15s;}
.status-btn:hover{background:var(--surface-2);color:var(--text);}
.status-page-input{width:38px;height:24px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:inherit;font-size:12px;}
.status-page-input:focus{outline:none;border-color:var(--accent);}
.zoom-slider{-webkit-appearance:none;appearance:none;width:90px;height:3px;background:var(--border);border-radius:2px;cursor:pointer;outline:none;}
.zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;}
.status-bar .spacer{flex:1;}
#ann-count{font-size:11px;}

/* ── Toasts ── */
.toast-container{position:fixed;bottom:50px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;}
.toast{padding:9px 14px;border-radius:9px;font-size:12px;font-weight:500;background:var(--surface-2);color:var(--text);border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:slideIn 0.2s ease;display:flex;align-items:center;gap:7px;}
.toast.success{border-color:var(--success);color:var(--success);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.info{border-color:var(--accent);color:var(--accent);}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Page Manager Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;width:520px;max-width:94vw;max-height:80vh;display:flex;flex-direction:column;gap:14px;box-shadow:0 16px 48px rgba(0,0,0,0.6);}
.modal-header{display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:15px;font-weight:600;}
.modal-close{width:28px;height:28px;border:none;background:transparent;color:var(--text-muted);border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--surface-2);color:var(--text);}
.modal-pages-grid{display:flex;gap:10px;flex-wrap:wrap;overflow-y:auto;padding:4px;}
.modal-page-thumb{position:relative;cursor:grab;border-radius:7px;border:2px solid var(--border);background:var(--bg);overflow:hidden;transition:all 0.15s;}
.modal-page-thumb:hover{border-color:var(--text-muted);}
.modal-page-thumb.active{border-color:var(--accent);}
.modal-page-thumb canvas{display:block;width:100px;}
.modal-page-thumb .mpt-num{text-align:center;font-size:10px;color:#888;padding:3px;background:rgba(0,0,0,0.5);}
.modal-page-thumb .mpt-del{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(239,68,68,0.9);border:none;border-radius:4px;color:#fff;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.modal-page-thumb:hover .mpt-del{display:flex;}
.modal-page-thumb.drag-over{border-color:var(--success);background:rgba(34,197,94,0.07);}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;}
.modal-btn{padding:7px 14px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.modal-btn:hover{border-color:var(--text-muted);color:var(--text);}
.modal-btn.primary{border-color:var(--accent);color:var(--accent);}
.modal-btn.primary:hover{background:rgba(245,158,11,0.1);}
.modal-btn.danger:hover{border-color:var(--danger);color:var(--danger);}
</style>
</head>
<body>

<!-- Upload Screen -->
<div id="upload-screen">
  <div class="drop-zone" id="drop-zone">
    <i class="fas fa-file-pdf"></i>
    <h2>Open PDF Document</h2>
    <p>Drag and drop your PDF here, or click to browse</p>
    <div class="browse-btn">Browse Files</div>
    <p style="margin-top:14px;font-size:11px;opacity:0.5;">Supports .pdf files</p>
    <input type="file" accept=".pdf,application/pdf" class="hidden-input" id="file-input">
  </div>
</div>

<!-- Main App -->
<div id="app">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="logo"><i class="fas fa-file-pdf" style="margin-right:5px;"></i>PDF Annotator</div>
    <div class="divider"></div>

    <!-- Open -->
    <button class="tb-btn" id="btn-open" title="Open PDF"><i class="fas fa-folder-open"></i></button>
    <input type="file" accept=".pdf,application/pdf" class="hidden-input" id="file-input-2">
    <div class="divider"></div>

    <!-- Tools -->
    <button class="tb-btn active" data-tool="hand" id="tool-hand" title="Hand (H)"><i class="fas fa-hand"></i></button>
    <button class="tb-btn" data-tool="highlight" id="tool-highlight" title="Highlight (L)" style="position:relative;">
      <i class="fas fa-highlighter"></i>
      <div class="hl-popover" id="hl-popover">
        <div style="font-size:10px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Highlight Color</div>
        <div class="color-grid" id="color-grid"></div>
      </div>
    </button>
    <button class="tb-btn" data-tool="text" id="tool-text" title="Insert Text (T)"><i class="fas fa-font"></i></button>
    <button class="tb-btn" data-tool="symbol" id="tool-symbol" title="Insert Symbol (S)" style="position:relative;">
      <i class="fas fa-check-square"></i>
      <div class="symbol-picker" id="symbol-picker-panel">
        <div class="symbol-picker-title">Special Symbols</div>
        <div class="symbol-grid" id="symbol-grid"></div>
      </div>
    </button>
    <button class="tb-btn" data-tool="image" id="tool-image" title="Insert Image (I)"><i class="fas fa-image"></i></button>
    <div class="divider"></div>

    <!-- Page Manager -->
    <button class="tb-btn" id="btn-page-manager" title="Page Manager — Add, Remove, Reorder"><i class="fas fa-layer-group"></i><span style="font-size:11px;">Pages</span></button>
    <div class="divider"></div>

    <!-- Right side -->
    <div class="toolbar-right">
      <span id="ann-count" style="font-size:11px;color:var(--text-muted);margin-right:4px;"></span>
      <button class="tb-btn danger-btn" id="btn-clear-page" title="Clear Page Annotations"><i class="fas fa-eraser"></i></button>
      <button class="tb-btn danger-btn" id="btn-clear-all" title="Clear All Annotations"><i class="fas fa-trash"></i></button>
      <div class="divider"></div>
      <button class="tb-btn" style="color:var(--accent);padding:0 10px;gap:5px;" id="btn-export" title="Export PDF">
        <i class="fas fa-file-pdf"></i><span style="font-size:12px;">Export</span>
      </button>

  <!-- Content -->
  <div class="content">
    <!-- Page Panel -->
    <div class="page-panel">
      <div class="page-panel-header">
        <span class="page-panel-label">Pages</span>
        <div class="page-panel-actions">
          <button class="pp-btn" id="pp-add" title="Add Blank Page"><i class="fas fa-plus"></i></button>

        <div class="annotation-layer" id="annotation-layer"></div>

  <!-- Status Bar -->

    <input type="range" class="zoom-slider" id="zoom-slider" min="25" max="400" value="100">
    <button class="status-btn" id="sb-zoom-in" title="Zoom In"><i class="fas fa-plus"></i></button>
    <span id="sb-zoom-label" style="min-width:38px;text-align:center;font-size:12px;">100%</span>
    <button class="status-btn" id="sb-fit" title="Fit to Width"><i class="fas fa-arrows-left-right"></i></button>
    <div class="spacer"></div>

</div>

<!-- Page Manager Modal -->
<div class="modal-overlay" id="page-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="fas fa-layer-group" style="margin-right:8px;color:var(--accent);"></i>Page Manager</h3>
      <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div style="font-size:12px;color:var(--text-muted);">Drag pages to reorder. Click <i class="fas fa-trash" style="color:#ef4444;"></i> to delete.</div>
    <div class="modal-pages-grid" id="modal-pages-grid"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" id="modal-add-blank"><i class="fas fa-plus"></i>Add Blank Page</button>
      <button class="modal-btn danger" id="modal-delete-current"><i class="fas fa-trash"></i>Delete Current Page</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<input type="file" accept="image/*" class="hidden-input" id="image-input">

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const HIGHLIGHT_COLORS = [
  {name:'Yellow',color:'#fbbf24'},{name:'Green',color:'#4ade80'},
  {name:'Blue',color:'#60a5fa'},{name:'Pink',color:'#f472b6'},
  {name:'Orange',color:'#fb923c'},{name:'Purple',color:'#c084fc'},
];

const TEXT_COLORS = [
  '#000000','#ffffff','#1a73e8','#ef4444','#f59e0b',
  '#22c55e','#a855f7','#ec4899','#06b6d4','#f97316',
  '#84cc16','#6366f1','#14b8a6','#e11d48','#0ea5e9',
  '#d97706','#16a34a','#7c3aed'
];

const SYMBOLS = [
  {sym:'✓', title:'Checkmark'},
  {sym:'✗', title:'Cross/X'},
  {sym:'☐', title:'Empty Checkbox'},
  {sym:'☑', title:'Checked Checkbox'},
  {sym:'☒', title:'Crossed Checkbox'},
  {sym:'◉', title:'Radio Filled'},
  {sym:'○', title:'Radio Empty'},
  {sym:'●', title:'Bullet Filled'},
  {sym:'►', title:'Arrow Right'},
  {sym:'◄', title:'Arrow Left'},
  {sym:'▲', title:'Arrow Up'},
  {sym:'▼', title:'Arrow Down'},
  {sym:'★', title:'Star Filled'},
  {sym:'☆', title:'Star Empty'},
  {sym:'⚠', title:'Warning'},
  {sym:'ℹ', title:'Info'},
  {sym:'©', title:'Copyright'},
  {sym:'®', title:'Registered'},
  {sym:'™', title:'Trademark'},
  {sym:'§', title:'Section'},
  {sym:'¶', title:'Paragraph'},
  {sym:'†', title:'Dagger'},
  {sym:'‡', title:'Double Dagger'},
  {sym:'°', title:'Degree'},
];

// ── State ─────────────────────────────────────────────────────────────────────
let pdfDoc = null;
let base64BackupSource = '';
let currentPage = 1;
let totalPages = 0;
let scale = 1.0;
let currentTool = 'hand';
let highlightColor = HIGHLIGHT_COLORS[0].color;
let annotations = {};
let nextId = 1;
let isRendering = false;
let pendingPage = null;
let dragState = null;
let resizeState = null;
let textWidthResizeState = null;
let imagePlacePos = null;
let activeTextId = null;
let globalIsResizingFlag = false;
// Page reorder state
let pageOrder = []; // array of 1-based original page indices (or 'blank_N')
let blankPageCount = 0;
let thumbDragSrc = null;

// ── DOM ───────────────────────────────────────────────────────────────────────
const uploadScreen    = document.getElementById('upload-screen');
const dropZone        = document.getElementById('drop-zone');
const fileInput       = document.getElementById('file-input');
const fileInput2      = document.getElementById('file-input-2');
const imageInput      = document.getElementById('image-input');
const app             = document.getElementById('app');
const viewerArea      = document.getElementById('viewer-area');
const pageContainer   = document.getElementById('page-container');
const pdfCanvas       = document.getElementById('pdf-canvas');
const textLayer       = document.getElementById('text-layer');
const annotationLayer = document.getElementById('annotation-layer');
const sbPageInput     = document.getElementById('sb-page-input');
const sbTotal         = document.getElementById('sb-total');
const sbZoomLabel     = document.getElementById('sb-zoom-label');
const zoomSlider      = document.getElementById('zoom-slider');
const toastContainer  = document.getElementById('toast-container');
const annCountEl      = document.getElementById('ann-count');
const annCountStatus  = document.getElementById('ann-count-status');
const pageThumbs      = document.getElementById('page-thumbs');
const colorGrid       = document.getElementById('color-grid');
const symbolGrid      = document.getElementById('symbol-grid');
const hlPopover       = document.getElementById('hl-popover');
const symbolPanel     = document.getElementById('symbol-picker-panel');
const pageModal       = document.getElementById('page-modal');
const modalPagesGrid  = document.getElementById('modal-pages-grid');

// ── Utilities ─────────────────────────────────────────────────────────────────
function genId() { return 'ann_' + (nextId++); }
function getAnnotations(page) {
  if (!annotations[page]) annotations[page] = { highlights:[], texts:[], images:[], symbols:[] };
  if (!annotations[page].symbols) annotations[page].symbols = [];
  return annotations[page];
}
function countAllAnnotations() {
  return Object.values(annotations).reduce((s,a) =>
    s + a.highlights.length + a.texts.length + a.images.length + (a.symbols||[]).length, 0);
}
function updateAnnCount() {
  const n = countAllAnnotations();
  const t = n > 0 ? n + ' annotation' + (n>1?'s':'') : '';
  annCountEl.textContent = t;
  annCountStatus.textContent = t;
}
function showToast(msg, type='info') {
  const icons = {success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'};
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = '<i class="fas ' + (icons[type]||'fa-info-circle') + '"></i>' + msg;
  toastContainer.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
function pageKey(displayPage) {
  return 'page_' + (pageOrder[displayPage - 1] || displayPage);
}

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Load PDF ──────────────────────────────────────────────────────────────────
async function loadPDF(data) {
  try {
    pdfDoc = await pdfjsLib.getDocument({ data }).promise;
    totalPages = pdfDoc.numPages;
    pageOrder = Array.from({length: totalPages}, (_, i) => i + 1);
    annotations = {};
    uploadScreen.style.display = 'none';
    app.classList.add('active');
    sbTotal.textContent = pageOrder.length;
    sbPageInput.max = pageOrder.length;
    await fitToWidth();
    await renderPageThumbs();
    showToast('PDF loaded successfully', 'success');
  } catch(e) {
    showToast('Failed to load PDF', 'error');
    console.error(e);
  }
}

function handleFile(file) {
  if (!file || file.type !== 'application/pdf') return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const view = new Uint8Array(e.target.result);
    let bin = '';
    view.forEach(b => bin += String.fromCharCode(b));
    base64BackupSource = btoa(bin);
    loadPDF(view);
  };
  reader.readAsArrayBuffer(file);
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });
fileInput2.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });
document.getElementById('btn-open').addEventListener('click', () => fileInput2.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

// ── Render Page ───────────────────────────────────────────────────────────────
async function renderPage(displayNum) {
  if (isRendering) { pendingPage = displayNum; return; }
  isRendering = true;
  try {
    const sourceIdx = pageOrder[displayNum - 1];
    let viewport, ctx;

    if (typeof sourceIdx === 'string' && sourceIdx.startsWith('blank')) {
      // Blank page
      const blankW = 595, blankH = 842;
      const w = blankW * scale, h = blankH * scale;
      pageContainer.style.width = w + 'px';
      pageContainer.style.height = h + 'px';
      pdfCanvas.width = w; pdfCanvas.height = h;
      ctx = pdfCanvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
    } else {
      const page = await pdfDoc.getPage(sourceIdx);
      viewport = page.getViewport({ scale });
      pageContainer.style.width = viewport.width + 'px';
      pageContainer.style.height = viewport.height + 'px';
      pdfCanvas.width = viewport.width; pdfCanvas.height = viewport.height;
      ctx = pdfCanvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;

      textLayer.innerHTML = '';
      textLayer.style.width = viewport.width + 'px';
      textLayer.style.height = viewport.height + 'px';
      textLayer.style.setProperty('--scale-factor', viewport.scale);
      const textContent = await page.getTextContent();
      pdfjsLib.renderTextLayer({ textContentSource: textContent, container: textLayer, viewport, textDivs: [] });
    }

    renderAnnotations(displayNum);
    sbPageInput.value = displayNum;
    currentPage = displayNum;
    updateAnnCount();

    // Highlight active thumb
    document.querySelectorAll('.page-thumb').forEach((t,i) => t.classList.toggle('active', i+1 === displayNum));
  } catch(e) { console.error(e); }
  isRendering = false;
  if (pendingPage !== null) { const p = pendingPage; pendingPage = null; renderPage(p); }
}

// ── Thumbnails ────────────────────────────────────────────────────────────────
async function renderPageThumbs() {
  pageThumbs.innerHTML = '';
  sbTotal.textContent = pageOrder.length;
  sbPageInput.max = pageOrder.length;
  for (let i = 0; i < pageOrder.length; i++) {
    const displayNum = i + 1;
    const sourceIdx = pageOrder[i];
    const wrap = document.createElement('div');
    wrap.className = 'page-thumb' + (displayNum === currentPage ? ' active' : '');
    wrap.dataset.display = displayNum;

    const thumbCanvas = document.createElement('canvas');
    if (typeof sourceIdx === 'string' && sourceIdx.startsWith('blank')) {
      thumbCanvas.width = 90; thumbCanvas.height = 127;
      const tc = thumbCanvas.getContext('2d');
      tc.fillStyle = '#fff'; tc.fillRect(0,0,90,127);
      tc.strokeStyle = '#ccc'; tc.strokeRect(0,0,90,127);
    } else {
      try {
        const pg = await pdfDoc.getPage(sourceIdx);
        const vp = pg.getViewport({ scale: 90 / pg.getViewport({scale:1}).width });
        thumbCanvas.width = vp.width; thumbCanvas.height = vp.height;
        await pg.render({ canvasContext: thumbCanvas.getContext('2d'), viewport: vp }).promise;
      } catch(e) {}
    }
    wrap.appendChild(thumbCanvas);

    const numEl = document.createElement('div');
    numEl.className = 'thumb-num';
    numEl.textContent = displayNum;
    wrap.appendChild(numEl);

    const delBtn = document.createElement('button');
    delBtn.className = 'thumb-del';
    delBtn.innerHTML = '<i class="fas fa-times"></i>';
    delBtn.title = 'Delete page';
    delBtn.addEventListener('click', e => { e.stopPropagation(); deletePage(displayNum); });
    wrap.appendChild(delBtn);

    wrap.addEventListener('click', () => goToPage(displayNum));
    wrap.draggable = true;
    wrap.addEventListener('dragstart', e => { thumbDragSrc = displayNum; e.dataTransfer.effectAllowed = 'move'; wrap.classList.add('page-thumb-drag'); });
    wrap.addEventListener('dragend', () => { wrap.classList.remove('page-thumb-drag'); document.querySelectorAll('.page-thumb').forEach(t => t.classList.remove('page-thumb-drop-over')); });
    wrap.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; wrap.classList.add('page-thumb-drop-over'); });
    wrap.addEventListener('dragleave', () => wrap.classList.remove('page-thumb-drop-over'));
    wrap.addEventListener('drop', e => { e.preventDefault(); wrap.classList.remove('page-thumb-drop-over'); if(thumbDragSrc && thumbDragSrc !== displayNum) reorderPage(thumbDragSrc, displayNum); thumbDragSrc = null; });
    pageThumbs.appendChild(wrap);
  }
}

// ── Page Operations ───────────────────────────────────────────────────────────
function addBlankPage(afterPage) {
  blankPageCount++;
  const key = 'blank_' + blankPageCount;
  const pos = afterPage || pageOrder.length;
  pageOrder.splice(pos, 0, key);
  sbTotal.textContent = pageOrder.length;
  sbPageInput.max = pageOrder.length;
  renderPageThumbs();
  showToast('Blank page added', 'success');
}

function deletePage(displayNum) {
  if (pageOrder.length <= 1) { showToast('Cannot delete last page', 'error'); return; }
  const key = pageOrder[displayNum - 1];
  pageOrder.splice(displayNum - 1, 1);
  // remap annotations
  const newAnnotations = {};
  Object.keys(annotations).forEach(k => {
    const oldKey = k; // 'page_X'
    if (k === 'page_' + key) return; // deleted
    newAnnotations[k] = annotations[k];
  });
  annotations = newAnnotations;
  sbTotal.textContent = pageOrder.length;
  sbPageInput.max = pageOrder.length;
  const newPage = Math.min(currentPage, pageOrder.length);
  renderPageThumbs().then(() => goToPage(newPage));
  showToast('Page deleted', 'info');
}

function reorderPage(fromDisplay, toDisplay) {
  const item = pageOrder.splice(fromDisplay - 1, 1)[0];
  pageOrder.splice(toDisplay - 1, 0, item);
  renderPageThumbs().then(() => {
    // stay on the moved page
    const newPos = pageOrder.indexOf(item) + 1;
    goToPage(newPos);
  });
}

// ── Annotations ───────────────────────────────────────────────────────────────
function renderAnnotations(displayNum) {
  closeActiveTextOptions();
  annotationLayer.innerHTML = '';
  const key = pageKey(displayNum);
  const anns = annotations[key] || getAnnotations(key);

  anns.highlights.forEach(hl => {
    hl.rects.forEach(r => {
      const div = document.createElement('div');
      div.className = 'hl-rect';
      div.style.cssText = `left:${r.x*100}%;top:${r.y*100}%;width:${r.w*100}%;height:${r.h*100}%;background:${hl.color};opacity:0.38;`;
      annotationLayer.appendChild(div);
    });
  });

  anns.texts.forEach(t => createTextElement(t));
  anns.images.forEach(img => createImageElement(img));
  (anns.symbols||[]).forEach(s => createSymbolElement(s));
}

function getPageAnnotations(displayPage) {
  const key = pageKey(displayPage);
  return getAnnotations(key);
}

function closeActiveTextOptions() {
  pageContainer.querySelectorAll('.text-formatter-tooltip').forEach(t => t.remove());
  document.querySelectorAll('.text-annotation-editing').forEach(el => {
    el.classList.remove('text-annotation-editing');
    el.style.border = '1px solid transparent';
  });
  activeTextId = null;
}

// ── Custom Color Popup ────────────────────────────────────────────────────────
function buildColorPopup(currentColor, onChange) {
  const popup = document.createElement('div');
  popup.className = 'color-popup';

  const grid = document.createElement('div');
  grid.className = 'color-popup-swatches';
  TEXT_COLORS.forEach(hex => {
    const sw = document.createElement('div');
    sw.className = 'color-popup-swatch' + (hex === currentColor ? ' selected' : '');
    sw.style.backgroundColor = hex;
    sw.title = hex;
    sw.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      grid.querySelectorAll('.color-popup-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      onChange(hex);
      popup.classList.remove('open');
    });
    grid.appendChild(sw);
  });

  const nativeRow = document.createElement('div');
  nativeRow.className = 'color-popup-native-row';
  const lbl = document.createElement('label');
  lbl.textContent = 'Custom…';
  const ni = document.createElement('input');
  ni.type = 'color'; ni.className = 'color-popup-native-input'; ni.value = currentColor;
  ni.addEventListener('input', e => { e.stopPropagation(); onChange(ni.value); });
  ni.addEventListener('change', e => { e.stopPropagation(); onChange(ni.value); popup.classList.remove('open'); });
  lbl.appendChild(ni);
  nativeRow.appendChild(lbl);

  popup.appendChild(grid);
  popup.appendChild(nativeRow);
  return popup;
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function attachTextFormatterTooltip(parentEl, data, targetField) {
  parentEl.querySelectorAll('.text-formatter-tooltip').forEach(t => t.remove());
  activeTextId = data.id;

  const tooltip = document.createElement('div');
  tooltip.className = 'text-formatter-tooltip';

  // Font
  const fontSelect = document.createElement('select');
  fontSelect.className = 'font-select';
  ['Times','Helvetica','Courier'].forEach(f => {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    if ((data.font||'Times') === f) o.selected = true;
    fontSelect.appendChild(o);
  });
  fontSelect.onchange = e => {
    e.stopPropagation();
    data.font = fontSelect.value;
    const fam = data.font === 'Times' ? 'Times New Roman' : data.font;
    parentEl.style.fontFamily = fam;
    if (targetField) targetField.style.fontFamily = fam;
  };

  // Size
  const sizeSelect = document.createElement('select');
  sizeSelect.className = 'size-select';
  [8,10,12,14,16,18,24,32,48].forEach(s => {
    const o = document.createElement('option');
    o.value = s+'px'; o.textContent = s;
    if ((data.size||12) === s) o.selected = true;
    sizeSelect.appendChild(o);
  });
  sizeSelect.onchange = e => {
    e.stopPropagation();
    data.size = parseInt(sizeSelect.value);
    parentEl.style.fontSize = (data.size * scale) + 'px';
    if (targetField) targetField.style.fontSize = (data.size * scale) + 'px';
  };

  const d1 = document.createElement('div'); d1.className = 'divider';

  // Bold
  const btnBold = document.createElement('button');
  btnBold.className = 'style-btn' + (data.isBold ? ' active' : '');
  btnBold.innerHTML = '<i class="fas fa-bold"></i>';
  btnBold.onclick = e => {
    e.stopPropagation();
    data.isBold = !data.isBold;
    parentEl.style.fontWeight = data.isBold ? 'bold' : 'normal';
    if (targetField) targetField.style.fontWeight = data.isBold ? 'bold' : 'normal';
    btnBold.classList.toggle('active');
  };

  // Italic
  const btnItalic = document.createElement('button');
  btnItalic.className = 'style-btn' + (data.isItalic ? ' active' : '');
  btnItalic.innerHTML = '<i class="fas fa-italic"></i>';
  btnItalic.onclick = e => {
    e.stopPropagation();
    data.isItalic = !data.isItalic;
    parentEl.style.fontStyle = data.isItalic ? 'italic' : 'normal';
    if (targetField) targetField.style.fontStyle = data.isItalic ? 'italic' : 'normal';
    btnItalic.classList.toggle('active');
  };

  const d2 = document.createElement('div'); d2.className = 'divider';

  // Color
  const colorBlock = document.createElement('div');
  colorBlock.className = 'color-picker-block';
  colorBlock.style.backgroundColor = data.color || '#000000';
  colorBlock.title = 'Text color';

  const colorPopup = buildColorPopup(data.color || '#000000', newColor => {
    data.color = newColor;
    colorBlock.style.backgroundColor = newColor;
    parentEl.style.color = newColor;
    if (targetField) targetField.style.color = newColor;
  });
  tooltip.appendChild(colorPopup);

  colorBlock.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    colorPopup.classList.toggle('open');
  });

  const d3 = document.createElement('div'); d3.className = 'divider';

  // Delete
  const btnDel = document.createElement('button');
  btnDel.className = 'delete-btn';
  btnDel.title = 'Delete text';
  btnDel.innerHTML = '<i class="fas fa-trash"></i>';
  btnDel.onclick = e => { e.stopPropagation(); deleteAnnotation(data.id); };

  tooltip.append(fontSelect, sizeSelect, d1, btnBold, btnItalic, d2, colorBlock, d3, btnDel);
  parentEl.appendChild(tooltip);

  // Auto-flip if tooltip overflows top
  requestAnimationFrame(() => {
    const tipRect = tooltip.getBoundingClientRect();
    if (tipRect.top < 0) {
      tooltip.style.bottom = 'auto';
      tooltip.style.top = 'calc(100% + 8px)';
      tooltip.style.setProperty('--arrow-top', 'auto');
      tooltip.querySelector(':after') && Object.assign(tooltip.style, { '--flip': '1' });
    }
  });

  document.addEventListener('mousedown', function handler(e) {
    if (!colorPopup.contains(e.target) && e.target !== colorBlock) colorPopup.classList.remove('open');
    if (!tooltip.contains(e.target) && !parentEl.contains(e.target)) document.removeEventListener('mousedown', handler);
  });
}

// ── Create Text Element ───────────────────────────────────────────────────────
function createTextElement(data) {
  const el = document.createElement('div');
  el.className = 'text-annotation';
  el.dataset.id = data.id;
  el.style.left       = (data.x * 100) + '%';
  el.style.top        = (data.y * 100) + '%';
  el.style.fontSize   = ((data.size || 12) * scale) + 'px';
  el.style.fontFamily = (data.font||'Times') === 'Times' ? 'Times New Roman' : (data.font||'Times');
  el.style.fontWeight = data.isBold ? 'bold' : 'normal';
  el.style.fontStyle  = data.isItalic ? 'italic' : 'normal';
  el.style.color      = data.color || '#000000';
  el.style.width      = data.w ? (data.w * 100) + '%' : 'auto';
  el.style.maxWidth   = data.maxW ? (data.maxW * 100) + '%' : '90%';
  el.textContent      = data.content;

  const handle = document.createElement('div');
  handle.className = 'text-width-handle';
  handle.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); startTextWidthResize(e, el, data); });
  el.appendChild(handle);

  // Single click when text tool active → show tooltip
  el.addEventListener('click', e => {
    e.stopPropagation();
    if (currentTool === 'text' && !e.target.closest('.text-width-handle')) {
      el.classList.add('text-annotation-editing');
      el.style.border = '1px dashed rgba(0,0,0,0.3)';
      attachTextFormatterTooltip(el, data, null);
    }
  });

  // Double-click → make editable (any tool)
  el.addEventListener('dblclick', e => { e.stopPropagation(); convertTextToInput(el, data); });

  el.addEventListener('mousedown', e => {
    if (e.target.closest('.text-formatter-tooltip') || e.target.closest('.text-width-handle') || e.target.tagName === 'INPUT') return;
    e.stopPropagation();
    startDrag(e, el, data, 'text');
  });

  annotationLayer.appendChild(el);
  return el;
}

// ── Convert to editable input ─────────────────────────────────────────────────
function convertTextToInput(el, data) {
  closeActiveTextOptions();
  el.innerHTML = '';
  el.classList.add('text-annotation-editing');
  el.style.border = '1px dashed rgba(0,0,0,0.4)';

  const field = document.createElement('input');
  field.type = 'text';
  field.className = 'text-input-overlay-box';
  field.value = data.content;

  const handle = document.createElement('div');
  handle.className = 'text-width-handle';
  handle.style.display = 'block';
  handle.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); startTextWidthResize(e, el, data); });

  el.appendChild(field);
  el.appendChild(handle);

  // Show tooltip immediately on editing
  attachTextFormatterTooltip(el, data, field);

  requestAnimationFrame(() => { field.focus(); field.setSelectionRange(field.value.length, field.value.length); });

  function commit() {
    const txt = field.value.trim();
    if (txt) { data.content = txt; renderAnnotations(currentPage); }
    else deleteAnnotation(data.id);
  }

  field.onblur = () => setTimeout(() => {
    if (document.activeElement === field || document.activeElement.closest('.text-formatter-tooltip')) return;
    commit();
  }, 150);
  field.onkeydown = ev => {
    if (ev.key === 'Enter') commit();
    if (ev.key === 'Escape') { renderAnnotations(currentPage); closeActiveTextOptions(); }
  };
}

// ── Delete Annotation ─────────────────────────────────────────────────────────
function deleteAnnotation(id) {
  const key = pageKey(currentPage);
  const anns = getAnnotations(key);
  anns.highlights = anns.highlights.filter(h => h.id !== id);
  anns.texts      = anns.texts.filter(t => t.id !== id);
  anns.images     = anns.images.filter(i => i.id !== id);
  anns.symbols    = (anns.symbols||[]).filter(s => s.id !== id);
  renderAnnotations(currentPage);
  updateAnnCount();
}

// ── Drag / Resize ─────────────────────────────────────────────────────────────
function startDrag(e, el, data, type) {
  const rect = pageContainer.getBoundingClientRect();
  dragState = { el, data, type, startMouseX:e.clientX, startMouseY:e.clientY, origX:data.x, origY:data.y, containerW:rect.width, containerH:rect.height };
  document.body.style.userSelect = 'none';
}
function startResize(e, el, data) {
  const rect = pageContainer.getBoundingClientRect();
  globalIsResizingFlag = true;
  resizeState = { el, data, startMouseX:e.clientX, origW:data.w, containerW:rect.width };
  document.body.style.userSelect = 'none';
}
function startTextWidthResize(e, el, data) {
  const rect = pageContainer.getBoundingClientRect();
  globalIsResizingFlag = true;
  textWidthResizeState = { el, data, startMouseX:e.clientX, origW:data.w||(el.offsetWidth/rect.width), containerW:rect.width };
  document.body.style.userSelect = 'none';
}

document.addEventListener('mousemove', e => {
  if (dragState) {
    const dx = (e.clientX - dragState.startMouseX) / dragState.containerW;
    const dy = (e.clientY - dragState.startMouseY) / dragState.containerH;
    dragState.data.x = Math.max(0, Math.min(0.95, dragState.origX + dx));
    dragState.data.y = Math.max(0, Math.min(0.95, dragState.origY + dy));
    dragState.el.style.left = (dragState.data.x * 100) + '%';
    dragState.el.style.top  = (dragState.data.y * 100) + '%';
  }
  if (resizeState) {
    const rdx = (e.clientX - resizeState.startMouseX) / resizeState.containerW;
    resizeState.data.w = Math.max(0.05, resizeState.origW + rdx);
    resizeState.el.style.width = (resizeState.data.w * 100) + '%';
  }
  if (textWidthResizeState) {
    const tdx = (e.clientX - textWidthResizeState.startMouseX) / textWidthResizeState.containerW;
    textWidthResizeState.data.w = Math.max(0.05, textWidthResizeState.origW + tdx);
    textWidthResizeState.el.style.width = (textWidthResizeState.data.w * 100) + '%';
  }
});

document.addEventListener('mouseup', () => {
  if (dragState) { document.body.style.userSelect = ''; dragState = null; }
  if (resizeState) { document.body.style.userSelect = ''; resizeState = null; setTimeout(() => { globalIsResizingFlag = false; }, 80); }
  if (textWidthResizeState) { document.body.style.userSelect = ''; textWidthResizeState = null; setTimeout(() => { globalIsResizingFlag = false; }, 80); }
});

// ── Highlight ─────────────────────────────────────────────────────────────────
textLayer.addEventListener('mouseup', () => {
  if (currentTool !== 'highlight') return;
  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const clientRects = range.getClientRects();
  const pageRect = pageContainer.getBoundingClientRect();
  const rects = [];
  for (let i = 0; i < clientRects.length; i++) {
    const r = clientRects[i];
    if (r.width < 1 || r.height < 1) continue;
    rects.push({ x:(r.left-pageRect.left)/pageRect.width, y:(r.top-pageRect.top)/pageRect.height, w:r.width/pageRect.width, h:r.height/pageRect.height });
  }
  sel.removeAllRanges();
  if (!rects.length) return;
  const key = pageKey(currentPage);
  getAnnotations(key).highlights.push({ id:genId(), rects, color:highlightColor });
  renderAnnotations(currentPage);
  updateAnnCount();
});

// ── Text Tool Click ───────────────────────────────────────────────────────────
pageContainer.addEventListener('click', e => {

  const rect = pageContainer.getBoundingClientRect();
  const relX = (e.clientX - rect.left) / rect.width;
  const relY = (e.clientY - rect.top)  / rect.height;

  if (currentTool === 'symbol') return; // handled by symbol panel

  // Text tool
  const tempId = genId();
  const mockData = { id:tempId, x:relX, y:relY, content:'', font:'Times', size:12, isBold:false, isItalic:false, color:'#000000', w:0.4 };

  const inputWrapper = document.createElement('div');
  inputWrapper.className = 'text-annotation text-annotation-editing';

  inputWrapper.appendChild(field);
  inputWrapper.appendChild(handle);
  annotationLayer.appendChild(inputWrapper);

  // Show tooltip immediately when text box appears
  attachTextFormatterTooltip(inputWrapper, mockData, field);

  requestAnimationFrame(() => field.focus());

  function commitNew() {
    const txt = field.value.trim();
    inputWrapper.remove();

      mockData.content = txt;

      getAnnotations(key).texts.push(mockData);

    if (document.activeElement === field || document.activeElement.closest('.text-formatter-tooltip')) return;

  }, 150);

    if (ev.key === 'Enter') commitNew();
    if (ev.key === 'Escape') { inputWrapper.remove(); closeActiveTextOptions(); }
  };
});

// ── Tool Switching ────────────────────────────────────────────────────────────
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tb-btn[data-tool]').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector('[data-tool="' + tool + '"]');
  if (btn) btn.classList.add('active');
  viewerArea.className = 'viewer-area tool-' + tool;
  closeActiveTextOptions();
  hlPopover.classList.remove('open');
  if (tool !== 'symbol') { symbolPanel.classList.remove('open'); pendingSymbol = null; }
}

document.querySelectorAll('.tb-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', e => {
    const tool = btn.dataset.tool;
    if (tool === 'highlight') {
      setTool('highlight');
      hlPopover.classList.toggle('open');
      return;
    }
    if (tool === 'symbol') {
      setTool('symbol');
      symbolPanel.classList.toggle('open');
      return;
    }
    if (tool === 'image') {
      setTool('image');
      pageContainer.addEventListener('click', function onceClick(e2) {
        if (e2.target.closest('.text-annotation') || e2.target.closest('.image-annotation')) return;
        const rect = pageContainer.getBoundingClientRect();
        imagePlacePos = { x:(e2.clientX-rect.left)/rect.width, y:(e2.clientY-rect.top)/rect.height };
        imageInput.click();
        pageContainer.removeEventListener('click', onceClick);
      }, { once: false });
      return;
    }
    setTool(tool);
  });
});

// ── Image input ───────────────────────────────────────────────────────────────
imageInput.addEventListener('change', e => {
  if (!e.target.files[0]) return;
  const file = e.target.files[0];
  if (!file.type.startsWith('image/')) return;
  const pos = { x: imagePlacePos?imagePlacePos.x:0.1, y: imagePlacePos?imagePlacePos.y:0.1 };
  imageInput.value = '';
  const reader = new FileReader();
  reader.onload = ev => {
    const src = ev.target.result;
    const img = new Image();
    img.onload = () => {
      const pageW = pageContainer.offsetWidth;
      let w = img.width / pageW;
      let h = (img.height / img.width) * w;
      if (w > 0.4) { w = 0.4; h = (img.height / img.width) * w; }
      const key = pageKey(currentPage);
      getAnnotations(key).images.push({ id:genId(), x:pos.x, y:pos.y, w, h, src });
      renderAnnotations(currentPage);
      updateAnnCount();
    };
    img.src = src;
  };
  reader.readAsDataURL(file);
});

// ── Zoom / Navigate ───────────────────────────────────────────────────────────
async function setZoom(newScale) {
  scale = Math.max(0.25, Math.min(4, newScale));
  const pct = Math.round(scale * 100);
  sbZoomLabel.textContent = pct + '%';
  zoomSlider.value = pct;
  if (pdfDoc) await renderPage(currentPage);
}
async function fitToWidth() {
  if (!pdfDoc) return;
  const sourceIdx = pageOrder[currentPage - 1];
  let nativeW = 595;
  if (typeof sourceIdx !== 'string') {
    const pg = await pdfDoc.getPage(sourceIdx);
    nativeW = pg.getViewport({scale:1}).width;
  }
  const available = viewerArea.clientWidth - 60;
  scale = Math.max(0.25, Math.min(4, available / nativeW));
  const pct = Math.round(scale * 100);
  sbZoomLabel.textContent = pct + '%';
  zoomSlider.value = pct;
  await renderPage(currentPage);
}
async function goToPage(num) {
  num = Math.max(1, Math.min(pageOrder.length, parseInt(num)||1));
  await renderPage(num);
}

document.getElementById('sb-zoom-in').addEventListener('click', () => setZoom(scale + 0.15));
document.getElementById('sb-zoom-out').addEventListener('click', () => setZoom(scale - 0.15));

document.getElementById('sb-prev').addEventListener('click', () => { if(currentPage>1) goToPage(currentPage-1); });
document.getElementById('sb-next').addEventListener('click', () => { if(currentPage<pageOrder.length) goToPage(currentPage+1); });

async function openPageModal() {
  pageModal.classList.add('open');
  modalPagesGrid.innerHTML = '';
  for (let i = 0; i < pageOrder.length; i++) {
    const displayNum = i + 1;
    const sourceIdx = pageOrder[i];
    const wrap = document.createElement('div');
    wrap.className = 'modal-page-thumb' + (displayNum === currentPage ? ' active' : '');
    wrap.dataset.display = displayNum;

    const tc = document.createElement('canvas');
    if (typeof sourceIdx === 'string') {
      tc.width = 100; tc.height = 141;
      const ctx = tc.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,100,141);
      ctx.strokeStyle = '#ccc'; ctx.strokeRect(0,0,100,141);
    } else {
      try {
        const pg = await pdfDoc.getPage(sourceIdx);
        const vp = pg.getViewport({ scale: 100 / pg.getViewport({scale:1}).width });
        tc.width = vp.width; tc.height = vp.height;
        await pg.render({ canvasContext: tc.getContext('2d'), viewport: vp }).promise;
      } catch(e) {}
    }
    wrap.appendChild(tc);

    const numEl = document.createElement('div');
    numEl.className = 'mpt-num';
    numEl.textContent = 'Page ' + displayNum;
    wrap.appendChild(numEl);

    const del = document.createElement('button');
    del.className = 'mpt-del';
    del.innerHTML = '<i class="fas fa-trash"></i>';
    del.addEventListener('click', e => { e.stopPropagation(); deletePage(displayNum); openPageModal(); });
    wrap.appendChild(del);

    wrap.addEventListener('click', () => { goToPage(displayNum); pageModal.classList.remove('open'); });
    wrap.draggable = true;
    let modalDragSrc = null;
    wrap.addEventListener('dragstart', e => { modalDragSrc = displayNum; e.dataTransfer.effectAllowed = 'move'; });
    wrap.addEventListener('dragover', e => { e.preventDefault(); wrap.classList.add('drag-over'); });
    wrap.addEventListener('dragleave', () => wrap.classList.remove('drag-over'));
    wrap.addEventListener('drop', e => {
      e.preventDefault(); wrap.classList.remove('drag-over');
      if (modalDragSrc && modalDragSrc !== displayNum) { reorderPage(modalDragSrc, displayNum); openPageModal(); }
    });
    modalPagesGrid.appendChild(wrap);
  }
  modalPagesGrid.querySelectorAll('.modal-page-thumb').forEach(w => {
    w.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', w.dataset.display); e.dataTransfer.effectAllowed = 'move'; });
    w.addEventListener('drop', e => {
      e.preventDefault(); w.classList.remove('drag-over');
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      const to = parseInt(w.dataset.display);
      if (from && to && from !== to) { reorderPage(from, to); openPageModal(); }
    });
  });
}

pageModal.addEventListener('click', e => { if(e.target === pageModal) pageModal.classList.remove('open'); });

// ── Export PDF ────────────────────────────────────────────────────────────────
function extractCleanImageData(srcUrl) {
  return new Promise(resolve => {
    if (srcUrl.startsWith('data:image/jpeg') || srcUrl.startsWith('data:image/png')) return resolve(srcUrl);
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      try { resolve(c.toDataURL('image/png')); } catch(e) { resolve(srcUrl); }
    };
    img.onerror = () => resolve(srcUrl);
    img.src = srcUrl;
  });
}

document.getElementById('btn-export').addEventListener('click', async () => {
  if (!base64BackupSource) { showToast('No PDF loaded', 'error'); return; }
  showToast('Exporting…', 'info');
  try {
    const bin = atob(base64BackupSource);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

    const targetDoc = await PDFLib.PDFDocument.load(bytes);
    const origPages = targetDoc.getPages();
    const newDoc = await PDFLib.PDFDocument.create();

    for (let i = 0; i < pageOrder.length; i++) {
      const displayNum = i + 1;
      const sourceIdx = pageOrder[i];
      let page;

      if (typeof sourceIdx === 'string') {
        // blank page
        page = newDoc.addPage([595, 842]);
      } else {
        const [copied] = await newDoc.copyPages(targetDoc, [sourceIdx - 1]);
        page = newDoc.addPage(copied);
      }

      const { width, height } = page.getSize();
      const key = pageKey(displayNum);
      const pageAnns = annotations[key];
      if (!pageAnns) continue;

      // Highlights
      for (const hl of pageAnns.highlights||[]) {
        const hex = hl.color.replace('#','');
        const r=parseInt(hex.substring(0,2),16)/255, g=parseInt(hex.substring(2,4),16)/255, b=parseInt(hex.substring(4,6),16)/255;
        for (const rect of hl.rects) {
          page.drawRectangle({ x:rect.x*width, y:height-(rect.y*height)-(rect.h*height), width:rect.w*width, height:rect.h*height, color:PDFLib.rgb(r,g,b), opacity:0.35 });
        }
      }

      // Text
      for (const txt of pageAnns.texts||[]) {
        let fontKey = PDFLib.StandardFonts.TimesRoman;
        if (txt.font==='Helvetica') fontKey = txt.isBold?(txt.isItalic?PDFLib.StandardFonts.HelveticaBoldOblique:PDFLib.StandardFonts.HelveticaBold):(txt.isItalic?PDFLib.StandardFonts.HelveticaOblique:PDFLib.StandardFonts.Helvetica);
        else if (txt.font==='Courier') fontKey = txt.isBold?(txt.isItalic?PDFLib.StandardFonts.CourierBoldOblique:PDFLib.StandardFonts.CourierBold):(txt.isItalic?PDFLib.StandardFonts.CourierOblique:PDFLib.StandardFonts.Courier);
        else fontKey = txt.isBold?(txt.isItalic?PDFLib.StandardFonts.TimesRomanBoldItalic:PDFLib.StandardFonts.TimesRomanBold):(txt.isItalic?PDFLib.StandardFonts.TimesRomanItalic:PDFLib.StandardFonts.TimesRoman);
        const font = await newDoc.embedFont(fontKey);
        const hex = (txt.color||'#000000').replace('#','');
        const r=parseInt(hex.substring(0,2),16)/255, g=parseInt(hex.substring(2,4),16)/255, b=parseInt(hex.substring(4,6),16)/255;
        const fs = txt.size || 12;
        page.drawText(txt.content, { x:(txt.x*width)+4, y:height-(txt.y*height)-(fs*1.15), size:fs, font, color:PDFLib.rgb(r,g,b), maxWidth:txt.w?txt.w*width:undefined });
      }

      // Symbols
      for (const sym of pageAnns.symbols||[]) {
        // Render symbol to a small canvas, embed as image
        const symCanvas = document.createElement('canvas');
        const symSize = (sym.size||24) * 3;
        symCanvas.width = symSize; symCanvas.height = symSize;
        const sc = symCanvas.getContext('2d');
        sc.fillStyle = sym.color || '#000000';
        sc.font = `${symSize * 0.8}px serif`;
        sc.textAlign = 'center';
        sc.textBaseline = 'middle';
        sc.fillText(sym.sym, symSize/2, symSize/2);
        try {
          const dataUrl = symCanvas.toDataURL('image/png');
          const imgEmbed = await newDoc.embedPng(dataUrl);
          const sz = (sym.size||24);
          page.drawImage(imgEmbed, { x:sym.x*width, y:height-(sym.y*height)-sz, width:sz, height:sz });
        } catch(err) { console.warn('Symbol embed failed:', err); }
      }

      // Images
      for (const imgObj of pageAnns.images||[]) {
        try {
          const clean = await extractCleanImageData(imgObj.src);
          const emb = clean.includes('image/png') ? await newDoc.embedPng(clean) : await newDoc.embedJpg(clean);
          const dims = emb.scale(1);
          const ew = imgObj.w * width;
          const eh = (dims.height / dims.width) * ew;
          page.drawImage(emb, { x:imgObj.x*width, y:height-(imgObj.y*height)-eh, width:ew, height:eh });
        } catch(e) { console.error('Image embed failed:', e); }
      }
    }

    const finalBytes = await newDoc.save();
    const blob = new Blob([finalBytes], { type:'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'annotated.pdf'; a.click();
    showToast('Export successful!', 'success');
  } catch(err) {
    console.error(err);
    showToast('Export failed', 'error');
  }
});

// ── Keyboard Shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
  switch(e.key.toLowerCase()) {
    case 'h': setTool('hand'); break;
    case 'l': setTool('highlight'); break;
    case 't': setTool('text'); break;
    case 'i': setTool('image'); break;
    case 's': setTool('symbol'); symbolPanel.classList.toggle('open'); break;
    case 'arrowleft': if(currentPage>1) goToPage(currentPage-1); break;
    case 'arrowright': if(currentPage<pageOrder.length) goToPage(currentPage+1); break;
    case 'escape': pageModal.classList.remove('open'); closeActiveTextOptions(); symbolPanel.classList.remove('open'); hlPopover.classList.remove('open'); break;
  }
  if ((e.ctrlKey||e.metaKey) && e.key==='+') { e.preventDefault(); setZoom(scale+0.15); }
  if ((e.ctrlKey||e.metaKey) && e.key==='-') { e.preventDefault(); setZoom(scale-0.15); }
  if ((e.ctrlKey||e.metaKey) && e.key==='0') { e.preventDefault(); fitToWidth(); }
});
</script>
