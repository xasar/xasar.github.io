<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Annotator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --sidebar: #1a1a1a;
            --surface: #242424;
            --surface-2: #2e2e2e;
            --border: #333;
            --text: #e8e8e8;
            --text-muted: #777;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --accent-glow: rgba(245,158,11,0.12);
            --danger: #ef4444;
            --success: #22c55e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }

        /* Upload Screen */
        #upload-screen {
            position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
            background:var(--bg);
            background-image: radial-gradient(circle at 20% 50%, rgba(245,158,11,0.04) 0%, transparent 50%),
                              radial-gradient(circle at 80% 50%, rgba(239,68,68,0.03) 0%, transparent 50%);
        }
        .drop-zone {
            width:520px; max-width:90vw; padding:60px 40px; border:2px dashed var(--border); border-radius:20px;
            text-align:center; cursor:pointer; transition:all 0.3s ease; position:relative; overflow:hidden;
            background:var(--surface);
        }
        .drop-zone::before {
            content:''; position:absolute; inset:0; background:linear-gradient(135deg, var(--accent-glow), transparent);
            opacity:0; transition:opacity 0.3s;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color:var(--accent); transform:translateY(-2px);
            box-shadow:0 8px 40px rgba(245,158,11,0.08);
        }
        .drop-zone:hover::before, .drop-zone.drag-over::before { opacity:1; }
        .drop-zone i { font-size:48px; color:var(--accent); margin-bottom:20px; display:block; position:relative; }
        .drop-zone h2 { font-size:22px; font-weight:600; margin-bottom:8px; position:relative; }
        .drop-zone p { color:var(--text-muted); font-size:14px; position:relative; }
        .drop-zone .browse-btn {
            display:inline-block; margin-top:20px; padding:10px 28px; background:var(--accent);
            color:#000; font-weight:600; border-radius:10px; font-size:14px; position:relative;
            transition:background 0.2s;
        }
        .drop-zone .browse-btn:hover { background:var(--accent-hover); }

        /* Main Layout */
        #app { display:none; height:100vh; flex-direction:column; }
        #app.active { display:flex; }

        /* Toolbar */
        .toolbar {
            height:54px; background:var(--sidebar); border-bottom:1px solid var(--border);
            display:flex; align-items:center; padding:0 16px; gap:8px; flex-shrink:0;
        }
        .toolbar .logo { font-weight:700; font-size:16px; color:var(--accent); margin-right:16px; letter-spacing:-0.5px; }
        .toolbar .divider { width:1px; height:28px; background:var(--border); margin:0 4px; }
        .tb-btn {
            width:36px; height:36px; border:none; background:transparent; color:var(--text-muted);
            border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
            font-size:14px; transition:all 0.15s;
        }
        .tb-btn:hover, .tb-btn.active { background:var(--surface-2); color:var(--text); }
        .tb-btn.active { color: var(--accent); border: 1px solid rgba(245,158,11,0.15); }
        .tb-btn:active { transform:scale(0.93); }
        .page-input {
            width:48px; height:32px; text-align:center; background:var(--surface); border:1px solid var(--border);
            border-radius:6px; color:var(--text); font-family:inherit; font-size:13px; font-weight:500;
        }
        .page-input:focus { outline:none; border-color:var(--accent); }
        .zoom-label { font-size:12px; color:var(--text-muted); min-width:42px; text-align:center; font-weight:500; }
        .toolbar-right { margin-left:auto; display:flex; align-items:center; gap:6px; }

        /* Content */
        .content { display:flex; flex:1; overflow:hidden; }

        /* Sidebar Actions Wrapper */
        .sidebar {
            width:210px; background:var(--sidebar); border-right:1px solid var(--border);
            padding:16px 12px; display:flex; flex-direction:column; gap:6px; flex-shrink:0; overflow-y:auto;
        }
        .sidebar-section { margin-bottom:12px; }
        .sidebar-label { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:8px; font-weight:600; }
        
        .color-grid { display:flex; gap:6px; flex-wrap:wrap; }
        .color-swatch {
            width:28px; height:28px; border-radius:8px; border:2px solid transparent; cursor:pointer;
            transition:all 0.15s; position:relative;
        }
        .color-swatch:hover { transform:scale(1.1); }
        .color-swatch.active { border-color:var(--text); box-shadow:0 0 0 2px var(--bg); }
        .color-swatch.active::after {
            content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900;
            position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
            font-size:11px; color:#000;
        }

        .action-btn {
            width:100%; padding:9px 12px; border:1px solid var(--border); background:var(--surface);
            color:var(--text-muted); border-radius:8px; cursor:pointer; font-family:inherit;
            font-size:12px; font-weight:500; transition:all 0.15s; display:flex; align-items:center; gap:8px;
        }
        .action-btn:hover { border-color:var(--text-muted); color:var(--text); }
        .action-btn.danger:hover { border-color:var(--danger); color:var(--danger); }
        .action-btn i { width:16px; text-align:center; }

        /* Viewer Area Page Scrollbars Fixes */
        .viewer-area {
            flex:1; overflow:auto !important; display:block; padding:30px;
            background:var(--bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(245,158,11,0.02) 0%, transparent 60%);
        }
        .viewer-area::-webkit-scrollbar { width:10px; height:10px; display:block !important; }
        .viewer-area::-webkit-scrollbar-track { background:transparent; }
        .viewer-area::-webkit-scrollbar-thumb { background:var(--surface-2); border-radius:4px; }
        .viewer-area::-webkit-scrollbar-thumb:hover { background:var(--border); }

        .page-container {
            position:relative; box-shadow:0 4px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
            border-radius:4px; overflow:visible; flex-shrink:0; margin: 0 auto;
        }
        .page-container canvas { display:block; }

        /* Text Layer - PDF.js */
        .text-layer {
            position:absolute; text-align:initial; inset:0; overflow:hidden;
            opacity:0.22; line-height:1; -webkit-text-size-adjust:none; text-size-adjust:none;
            forced-color-adjust:none; transform-origin:0 0;
        }
        .text-layer :is(span, br) {
            color:transparent; position:absolute; white-space:pre; cursor:text; transform-origin:0% 0%;
        }

        /* Selection states */
        .tool-highlight .text-layer ::selection { background:rgba(245,158,11,0.45); }
        .tool-highlight .text-layer { opacity:0.22; cursor:text; pointer-events:auto; }

        .tool-hand .text-layer,
        .tool-text .text-layer,
        .tool-image .text-layer { pointer-events:none; }

        .tool-text .page-container,
        .tool-image .page-container { cursor:crosshair; }

        /* Annotation Layer */
        .annotation-layer { position:absolute; inset:0; pointer-events:none; overflow:visible; }
        .hl-rect { position:absolute; border-radius:2px; pointer-events:none; mix-blend-mode:multiply; }

        /* Clean Text Nodes — Transparent Box Design */
        .text-annotation {
            position:absolute; pointer-events:auto; cursor:move; min-width:60px;
            background:transparent; border:1px solid transparent;
            padding:4px 6px; color:#1a73e8; line-height:1.2;
            word-wrap:break-word; user-select: none;
            display: inline-block;
        }
        .text-annotation:hover { border-color:rgba(26, 115, 232, 0.4); background: rgba(26, 115, 232, 0.03); }
        
        /* Floating Screenshot Tooltip Formatting panel */
        .text-formatter-tooltip {
            position: absolute; bottom: calc(100% + 12px); left: 0;
            background: #111111; border: 1px solid #222222; border-radius: 8px;
            padding: 6px 10px; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.45); z-index: 500; pointer-events: auto;
        }
        .text-formatter-tooltip::after {
            content: ''; position: absolute; top: 100%; left: 16px;
            border-width: 6px; border-style: solid;
            border-color: #111111 transparent transparent transparent;
        }
        .text-formatter-tooltip select {
            background: #222222; color: #ffffff; font-size: 13px; border: 1px solid #333333;
            border-radius: 4px; padding: 3px 24px 3px 8px; outline: none; cursor: pointer;
            appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat; background-position: right 8px center;
        }
        .text-formatter-tooltip select.size-select { width: 75px; }
        .text-formatter-tooltip .divider { width: 1px; height: 18px; background: #333333; margin: 0 2px; }
        .text-formatter-tooltip .style-btn {
            background: transparent; border: none; color: #888888; font-size: 13px;
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 4px; transition: all 0.1s;
        }
        .text-formatter-tooltip .style-btn:hover { background: #222222; color: #ffffff; }
        .text-formatter-tooltip .style-btn.active { color: #1a73e8; background: rgba(26, 115, 232, 0.15); }
        .text-formatter-tooltip .color-picker-block {
            width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer; position: relative;
        }
        .text-formatter-tooltip .color-picker-input {
            position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        }

        /* Right-Side Box Horizontal Width Stretch Handle */
        .text-width-handle {
            position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
            width: 12px; height: 12px; border-radius: 50%; background: #1a73e8;
            border: 2px solid #ffffff; cursor: e-resize; display: none; z-index: 600;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3); pointer-events: auto;
        }
        .text-annotation-editing .text-width-handle { display: block; }

        /* Delete Badge */
        .text-annotation .ann-delete-badge {
            position:absolute; top:50%; right:-28px; transform:translateY(-50%);
            width:20px; height:20px; border-radius:50%; background:#ef4444; color:#fff;
            font-size:10px; cursor:pointer; display:none; align-items:center; justify-content:center;
            border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 10;
        }
        .text-annotation:hover:not(.text-annotation-editing) .ann-delete-badge { display:flex; }

        /* Image nodes */
        .image-annotation {
            position:absolute; pointer-events:auto; cursor:move; border:2px solid transparent;
            border-radius:6px; transition:border-color 0.15s;
        }
        .image-annotation:hover { border-color:var(--accent); }
        .image-annotation img { display:block; width:100%; height:100%; object-fit:fill; border-radius:4px; pointer-events:none; }
        .image-annotation .ann-delete {
            position:absolute; top:-10px; right:-10px; width:22px; height:22px; border-radius:50%;
            background:var(--danger); color:#fff; border:2px solid var(--bg); font-size:9px;
            cursor:pointer; display:none; align-items:center; justify-content:center;
        }
        .image-annotation:hover .ann-delete { display:flex; }
        .resize-handle {
            position:absolute; bottom:-6px; right:-6px; width:14px; height:14px;
            background:var(--accent); border-radius:3px; border:2px solid var(--bg);
            cursor:nwse-resize; display:none;
        }
        .image-annotation:hover .resize-handle { display:block; }

        /* Stable Auto-Growing Text Input Style */
        .text-input-overlay-box {
            border: none !important; background: transparent !important;
            outline: none !important; padding: 0 !important; margin: 0 !important;
            color: inherit !important; font-family: inherit !important;
            font-size: inherit !important; font-weight: inherit !important;
            font-style: inherit !important; width: 100%; height: 100%;
            display: inline-block; box-shadow: none !important;
        }

        .hidden-input { display:none; }

        .loading-overlay {
            position:absolute; inset:0; background:rgba(15,15,15,0.85); display:flex;
            align-items:center; justify-content:center; z-index:50; border-radius:4px;
        }
        .spinner {
            width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent);
            border-radius:50%; animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div id="upload-screen">
        <div class="drop-zone" id="drop-zone">
            <i class="fas fa-file-pdf"></i>
            <h2>Open PDF Document</h2>
            <p>Drag and drop your PDF here, or click to browse</p>
            <div class="browse-btn">Browse Files</div>
            <p style="margin-top:16px; font-size:12px; opacity:0.5;">Supports .pdf files</p>
            <input type="file" accept=".pdf,application/pdf" class="hidden-input" id="file-input">
        </div>
    </div>

    <div id="app">
        <div class="toolbar">
            <div class="logo"><i class="fas fa-file-pdf" style="margin-right:6px;"></i><span>PDF Annotator</span></div>
            <div class="divider"></div>
            
            <button class="tb-btn" id="btn-open" title="Open PDF"><i class="fas fa-folder-open"></i></button>
            <input type="file" accept=".pdf,application/pdf" class="hidden-input" id="file-input-2">
            <div class="divider"></div>
            
            <button class="tb-btn" id="btn-prev" title="Previous Page (Left Arrow)"><i class="fas fa-chevron-left"></i></button>
            <input type="number" class="page-input" id="page-input" value="1" min="1">
            <span style="font-size:13px; color:var(--text-muted);">/</span>
            <span style="font-size:13px; color:var(--text-muted);" id="total-pages">0</span>
            <button class="tb-btn" id="btn-next" title="Next Page (Right Arrow)"><i class="fas fa-chevron-right"></i></button>
            <div class="divider"></div>
            
            <button class="tb-btn" id="btn-zoom-out" title="Zoom Out (Ctrl+-)"><i class="fas fa-minus"></i></button>
            <span class="zoom-label" id="zoom-label">100%</span>
            <button class="tb-btn" id="btn-zoom-in" title="Zoom In (Ctrl++)"><i class="fas fa-plus"></i></button>
            <button class="tb-btn" id="btn-fit" title="Fit to Width (Ctrl+0)"><i class="fas fa-arrows-left-right"></i></button>
            <div class="divider"></div>

            <button class="tb-btn active" data-tool="hand" id="tool-hand" title="Hand Tool (H)"><i class="fas fa-hand"></i></button>
            <button class="tb-btn" data-tool="highlight" id="tool-highlight" title="Highlight Tool (L)"><i class="fas fa-highlighter"></i></button>
            <button class="tb-btn" data-tool="text" id="tool-text" title="Insert Text Tool (T)"><i class="fas fa-font"></i></button>
            <button class="tb-btn" data-tool="image" id="tool-image" title="Insert Image Tool (I)"><i class="fas fa-image"></i></button>

            <div class="toolbar-right">
                <span id="ann-count" style="font-size:11px; color:var(--text-muted); margin-right:6px;"></span>
                <button class="tb-btn" style="color:var(--accent); width:auto; padding:0 12px; gap:6px;" id="btn-export" title="Export to PDF Document File">
                    <i class="fas fa-file-pdf"></i><span>Export PDF</span>
                </button>
            </div>
        </div>

        <div class="content">
            <div class="sidebar">
                <div class="sidebar-section" id="highlight-colors-section" style="display:none;">
                    <div class="sidebar-label">Highlight Color</div>
                    <div class="color-grid" id="color-grid"></div>
                </div>
                <div class="sidebar-section" style="margin-top:auto;">
                    <div class="sidebar-label">Actions</div>
                    <button class="action-btn danger" id="btn-clear-page"><i class="fas fa-eraser"></i><span>Clear Page</span></button>
                    <button class="action-btn danger" id="btn-clear-all" style="margin-top:4px;"><i class="fas fa-trash"></i><span>Clear All</span></button>
                </div>
            </div>

            <div class="viewer-area tool-hand" id="viewer-area">
                <div class="page-container" id="page-container">
                    <canvas id="pdf-canvas"></canvas>
                    <div class="text-layer" id="text-layer"></div>
                    <div class="annotation-layer" id="annotation-layer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <input type="file" accept="image/*" class="hidden-input" id="image-input">

    <script>
        const HIGHLIGHT_COLORS = [
            { name: 'Yellow', color: '#fbbf24' },
            { name: 'Green',  color: '#4ade80' },
            { name: 'Blue',   color: '#60a5fa' },
            { name: 'Pink',   color: '#f472b6' },
            { name: 'Orange', color: '#fb923c' },
            { name: 'Purple', color: '#c084fc' },
        ];

        let pdfDoc = null;
        let base64BackupSource = ""; 
        let currentPage = 1;
        let totalPages = 0;
        let scale = 1.0;
        let currentTool = 'hand';
        let highlightColor = HIGHLIGHT_COLORS[0].color;
        let annotations = {};          
        let nextId = 1;
        let isRendering = false;
        let pendingPage = null;
        let dragState = null;
        let resizeState = null;
        let textWidthResizeState = null; 
        let imagePlacePos = null;      
        let activeTextId = null;
        let globalIsResizingFlag = false; 

        // Initialize DOM Elements
        const uploadScreen    = document.getElementById('upload-screen');
        const dropZone        = document.getElementById('drop-zone');
        const fileInput       = document.getElementById('file-input');
        const fileInput2      = document.getElementById('file-input-2');
        const imageInput      = document.getElementById('image-input');
        const app             = document.getElementById('app');
        const viewerArea      = document.getElementById('viewer-area');
        const pageContainer   = document.getElementById('page-container');
        const pdfCanvas       = document.getElementById('pdf-canvas');
        const textLayer       = document.getElementById('text-layer');
        const annotationLayer = document.getElementById('annotation-layer');
        const pageInputEl     = document.getElementById('page-input');
        const totalPagesEl    = document.getElementById('total-pages');
        const zoomLabel       = document.getElementById('zoom-label');
        const colorGrid       = document.getElementById('color-grid');
        const toastContainer  = document.getElementById('toast-container');
        const annCountEl      = document.getElementById('ann-count');

        function genId() { return 'ann_' + (nextId++); }

        function getAnnotations(page) {
            if (!annotations[page]) annotations[page] = { highlights: [], texts: [], images: [] };
            return annotations[page];
        }

        function countAllAnnotations() {
            return Object.values(annotations).reduce((s, a) => s + a.highlights.length + a.texts.length + a.images.length, 0);
        }

        function updateAnnCount() {
            const n = countAllAnnotations();
            annCountEl.textContent = n > 0 ? n + ' annotation' + (n > 1 ? 's' : '') : '';
        }

        function showToast(message, type = 'info') {
            var t = document.createElement('div');
            t.className = 'toast ' + type;
            t.innerHTML = '<i class="fas fa-info-circle"></i>' + message;
            toastContainer.appendChild(t);
            setTimeout(function () {
                t.classList.add('out');
                setTimeout(function () { t.remove(); }, 300);
            }, 2800);
        }

        function buildColorGrid() {
            colorGrid.innerHTML = '';
            HIGHLIGHT_COLORS.forEach(function (c) {
                var s = document.createElement('div');
                s.className = 'color-swatch' + (c.color === highlightColor ? ' active' : '');
                s.style.background = c.color;
                s.addEventListener('click', function () {
                    highlightColor = c.color;
                    colorGrid.querySelectorAll('.color-swatch').forEach(function (el) { el.classList.remove('active'); });
                    s.classList.add('active');
                });
                colorGrid.appendChild(s);
            });
        }
        buildColorGrid();

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tb-btn[data-tool]').forEach(function (b) {
                b.classList.toggle('active', b.dataset.tool === tool);
            });
            viewerArea.className = 'viewer-area tool-' + tool;
            document.getElementById('highlight-colors-section').style.display = tool === 'highlight' ? '' : 'none';
            closeActiveTextOptions();
        }

        document.querySelectorAll('.tb-btn[data-tool]').forEach(function (btn) {
            btn.addEventListener('click', function () { setTool(btn.dataset.tool); });
        });

        async function loadPDF(uint8Data) {
            try {
                pdfDoc = await pdfjsLib.getDocument({ data: uint8Data }).promise;
                totalPages  = pdfDoc.numPages;
                currentPage = 1;
                annotations = {};
                nextId      = 1;

                totalPagesEl.textContent = totalPages;
                pageInputEl.max = totalPages;
                pageInputEl.value = 1;

                uploadScreen.style.display = 'none';
                app.classList.add('active');

                await fitToWidth();
                showToast('Loaded Document Asset', 'success');
            } catch (e) {
                showToast('Failed to read document configuration', 'error');
            }
        }

        function handleFile(file) {
            if (!file || file.type !== 'application/pdf') return;
            var reader = new FileReader();
            reader.onload = function (e) { 
                const rawBuffer = e.target.result;
                const view = new Uint8Array(rawBuffer);
                
                let binaryString = "";
                for (let i = 0; i < view.length; i++) {
                    binaryString += String.fromCharCode(view[i]);
                }
                base64BackupSource = btoa(binaryString);
                loadPDF(view); 
            };
            reader.readAsArrayBuffer(file);
        }

        dropZone.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function (e) { if (e.target.files[0]) handleFile(e.target.files[0]); });
        fileInput2.addEventListener('change', function (e) { if (e.target.files[0]) handleFile(e.target.files[0]); });
        document.getElementById('btn-open').addEventListener('click', function () { fileInput2.click(); });

        dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
        dropZone.addEventListener('drop', function (e) {
            e.preventDefault();
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        async function renderPage(num) {
            if (isRendering) { pendingPage = num; return; }
            isRendering = true;

            try {
                var page     = await pdfDoc.getPage(num);
                var viewport = page.getViewport({ scale: scale });

                pageContainer.style.width = viewport.width + 'px';
                pageContainer.style.height = viewport.height + 'px';

                pdfCanvas.width  = viewport.width;
                pdfCanvas.height = viewport.height;
                var ctx = pdfCanvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                textLayer.innerHTML = '';
                textLayer.style.width  = viewport.width + 'px';
                textLayer.style.height = viewport.height + 'px';
                textLayer.style.setProperty('--scale-factor', viewport.scale);

                var textContent = await page.getTextContent();
                pdfjsLib.renderTextLayer({
                    textContentSource: textContent,
                    container: textLayer,
                    viewport: viewport,
                    textDivs: [],
                });

                renderAnnotations(num);
                pageInputEl.value = num;
                currentPage = num;
                updateAnnCount();
            } catch (e) {
                console.error(e);
            }
            isRendering = false;
            if (pendingPage !== null) { var p = pendingPage; pendingPage = null; renderPage(p); }
        }

        function renderAnnotations(pageNum) {
            closeActiveTextOptions();
            annotationLayer.innerHTML = '';
            var anns = getAnnotations(pageNum);

            anns.highlights.forEach(function (hl) {
                hl.rects.forEach(function (r) {
                    var div = document.createElement('div');
                    div.className = 'hl-rect';
                    div.style.left   = (r.x * 100) + '%';
                    div.style.top    = (r.y * 100) + '%';
                    div.style.width  = (r.w * 100) + '%';
                    div.style.height = (r.h * 100) + '%';
                    div.style.background = hl.color;
                    div.style.opacity = '0.38';
                    annotationLayer.appendChild(div);
                });
            });

            anns.texts.forEach(function (t) { createTextElement(t); });
            anns.images.forEach(function (img) { createImageElement(img); });
        }

        function closeActiveTextOptions() {
            var openTooltip = pageContainer.querySelector('.text-formatter-tooltip');
            if (openTooltip) openTooltip.remove();
            
            document.querySelectorAll('.text-annotation-editing').forEach(el => {
                el.classList.remove('text-annotation-editing');
                el.style.border = '1px solid transparent';
            });
            activeTextId = null;
        }

        function attachTextFormatterTooltip(parentEl, data, targetField = null) {
            var openTooltip = pageContainer.querySelector('.text-formatter-tooltip');
            if (openTooltip) openTooltip.remove();
            activeTextId = data.id;

            var tooltip = document.createElement('div');
            tooltip.className = 'text-formatter-tooltip';

            var fontSelect = document.createElement('select');
            ['Courier', 'Helvetica', 'Times'].forEach(f => {
                var opt = document.createElement('option');
                opt.value = f; opt.textContent = f;
                if(data.font === f) opt.selected = true;
                fontSelect.appendChild(opt);
            });
            fontSelect.onchange = function(e) {
                e.stopPropagation();
                data.font = fontSelect.value;
                const fam = data.font === 'Times' ? 'Times New Roman' : data.font;
                parentEl.style.fontFamily = fam;
                if (targetField) targetField.style.fontFamily = fam;
            };

            var sizeSelect = document.createElement('select');
            sizeSelect.className = 'size-select';
            ['12px', '14px', '18px', '24px', '32px', '48px'].forEach(s => {
                var opt = document.createElement('option');
                opt.value = s; opt.textContent = s;
                if((data.size || 14) + 'px' === s) opt.selected = true;
                sizeSelect.appendChild(opt);
            });
            sizeSelect.onchange = function(e) {
                e.stopPropagation();
                data.size = parseInt(sizeSelect.value);
                parentEl.style.fontSize = (data.size * scale) + 'px';
                if (targetField) targetField.style.fontSize = (data.size * scale) + 'px';
            };

            var div1 = document.createElement('div'); div1.className = 'divider';

            var btnBold = document.createElement('button');
            btnBold.className = 'style-btn' + (data.isBold ? ' active' : '');
            btnBold.innerHTML = '<i class="fas fa-bold"></i>';
            btnBold.onclick = function(e) {
                e.stopPropagation();
                data.isBold = !data.isBold;
                const weight = data.isBold ? 'bold' : 'normal';
                parentEl.style.fontWeight = weight;
                if (targetField) targetField.style.fontWeight = weight;
                btnBold.classList.toggle('active');
            };

            var btnItalic = document.createElement('button');
            btnItalic.className = 'style-btn' + (data.isItalic ? ' active' : '');
            btnItalic.innerHTML = '<i class="fas fa-italic"></i>';
            btnItalic.onclick = function(e) {
                e.stopPropagation();
                data.isItalic = !data.isItalic;
                const styleVal = data.isItalic ? 'italic' : 'normal';
                parentEl.style.fontStyle = styleVal;
                if (targetField) targetField.style.fontStyle = styleVal;
                btnItalic.classList.toggle('active');
            };

            var div2 = document.createElement('div'); div2.className = 'divider';

            var colorBlock = document.createElement('div');
            colorBlock.className = 'color-picker-block';
            colorBlock.style.backgroundColor = data.color || '#1a73e8';

            var colorInput = document.createElement('input');
            colorInput.type = 'color';
            colorInput.className = 'color-picker-input';
            colorInput.value = data.color || '#1a73e8';
            colorInput.oninput = function(e) {
                e.stopPropagation();
                data.color = colorInput.value;
                colorBlock.style.backgroundColor = data.color;
                parentEl.style.color = data.color;
                if (targetField) targetField.style.color = data.color;
            };

            colorBlock.appendChild(colorInput);
            tooltip.append(fontSelect, sizeSelect, div1, btnBold, btnItalic, div2, colorBlock);
            parentEl.appendChild(tooltip);
        }

        function createTextElement(data) {
            var el = document.createElement('div');
            el.className = 'text-annotation';
            el.dataset.id = data.id;
            el.style.left = (data.x * 100) + '%';
            el.style.top  = (data.y * 100) + '%';
            el.style.fontSize = ((data.size || 14) * scale) + 'px';
            el.style.fontFamily = data.font === 'Times' ? 'Times New Roman' : (data.font || 'Courier');
            el.style.fontWeight = data.isBold ? 'bold' : 'normal';
            el.style.fontStyle = data.isItalic ? 'italic' : 'normal';
            el.style.color = data.color || '#1a73e8';
            el.style.width = data.w ? (data.w * 100) + '%' : 'auto';
            el.style.maxWidth = data.maxW ? (data.maxW * 100) + '%' : '90%';
            el.textContent = data.content;

            var del = document.createElement('button');
            del.className = 'ann-delete-badge';
            del.innerHTML = '<i class="fas fa-times"></i>';
            del.onclick = function (e) { e.stopPropagation(); deleteAnnotation(data.id); };
            el.appendChild(del);

            var handle = document.createElement('div');
            handle.className = 'text-width-handle';
            handle.addEventListener('mousedown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                startTextWidthResize(e, el, data);
            });
            el.appendChild(handle);

            el.addEventListener('click', function(e) {
                e.stopPropagation();
                if (currentTool === 'text') {
                    convertTextToInput(el, data);
                } else {
                    if(activeTextId === data.id) {
                        closeActiveTextOptions();
                    } else {
                        el.classList.add('text-annotation-editing');
                        el.style.border = '1px dashed #1a73e8';
                        attachTextFormatterTooltip(el, data);
                    }
                }
            });

            el.addEventListener('mousedown', function (e) {
                if (e.target.closest('.ann-delete-badge') || e.target.closest('.text-formatter-tooltip') || e.target.closest('.text-width-handle') || e.target.tagName === 'INPUT') return;
                e.stopPropagation();
                startDrag(e, el, data, 'text');
            });

            annotationLayer.appendChild(el);
            return el;
        }

        function convertTextToInput(el, data) {
            closeActiveTextOptions();
            el.innerHTML = '';
            el.classList.add('text-annotation-editing');
            el.style.border = '1px dashed #1a73e8';

            var field = document.createElement('input');
            field.type = 'text';
            field.className = 'text-input-overlay-box';
            field.value = data.content;

            var handle = document.createElement('div');
            handle.className = 'text-width-handle';
            handle.style.display = 'block';
            handle.addEventListener('mousedown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                startTextWidthResize(e, el, data);
            });

            el.appendChild(field);
            el.appendChild(handle);
            attachTextFormatterTooltip(el, data, field);

            requestAnimationFrame(() => { 
                field.focus(); 
                field.setSelectionRange(field.value.length, field.value.length);
            });

            function commitUpdatedData() {
                var finalTxt = field.value.trim();
                if(finalTxt) {
                    data.content = finalTxt;
                    renderAnnotations(currentPage);
                } else {
                    deleteAnnotation(data.id);
                }
            }

            field.onblur = function() {
                setTimeout(() => {
                    if (document.activeElement === field || document.activeElement.closest('.text-formatter-tooltip')) return;
                    commitUpdatedData();
                }, 150);
            };

            field.onkeydown = function(ev) {
                if(ev.key === 'Enter') commitUpdatedData();
                if(ev.key === 'Escape') { renderAnnotations(currentPage); closeActiveTextOptions(); }
            };
        }

        function createImageElement(data) {
            var el = document.createElement('div');
            el.className = 'image-annotation';
            el.dataset.id = data.id;
            el.style.left  = (data.x * 100) + '%';
            el.style.top   = (data.y * 100) + '%';
            el.style.width = (data.w * 100) + '%';

            var img = document.createElement('img');
            img.src = data.src;
            img.draggable = false;
            el.appendChild(img);

            var del = document.createElement('button');
            del.className = 'ann-delete';
            del.innerHTML = '<i class="fas fa-xmark"></i>';
            del.addEventListener('click', function (e) { e.stopPropagation(); deleteAnnotation(data.id); });
            el.appendChild(del);

            var rh = document.createElement('div');
            rh.className = 'resize-handle';
            rh.addEventListener('mousedown', function (e) { 
                e.stopPropagation(); 
                e.preventDefault();
                startResize(e, el, data); 
            });
            el.appendChild(rh);

            el.addEventListener('mousedown', function (e) {
                if (e.target.closest('.ann-delete') || e.target.closest('.resize-handle')) return;
                e.stopPropagation();
                startDrag(e, el, data, 'image');
            });

            annotationLayer.appendChild(el);
            return el;
        }

        function deleteAnnotation(id) {
            var anns = getAnnotations(currentPage);
            anns.highlights = anns.highlights.filter(function (h) { return h.id !== id; });
            anns.texts      = anns.texts.filter(function (t) { return t.id !== id; });
            anns.images     = anns.images.filter(function (i) { return i.id !== id; });
            renderAnnotations(currentPage);
            updateAnnCount();
        }

        function startDrag(e, el, data, type) {
            var rect = pageContainer.getBoundingClientRect();
            dragState = {
                el: el, data: data, type: type,
                startMouseX: e.clientX, startMouseY: e.clientY,
                origX: data.x, origY: data.y,
                containerW: rect.width, containerH: rect.height,
            };
            document.body.style.userSelect = 'none';
        }

        function startResize(e, el, data) {
            var rect = pageContainer.getBoundingClientRect();
            globalIsResizingFlag = true; 
            resizeState = {
                el: el, data: data,
                startMouseX: e.clientX,
                origW: data.w, containerW: rect.width,
            };
            document.body.style.userSelect = 'none';
        }

        function startTextWidthResize(e, el, data) {
            var rect = pageContainer.getBoundingClientRect();
            globalIsResizingFlag = true;
            textWidthResizeState = {
                el: el, data: data,
                startMouseX: e.clientX,
                origW: data.w || (el.offsetWidth / rect.width),
                containerW: rect.width
            };
            document.body.style.userSelect = 'none';
        }

        document.addEventListener('mousemove', function (e) {
            if (dragState) {
                var dx = (e.clientX - dragState.startMouseX) / dragState.containerW;
                var dy = (e.clientY - dragState.startMouseY) / dragState.containerH;
                dragState.data.x = Math.max(0, Math.min(0.95, dragState.origX + dx));
                dragState.data.y = Math.max(0, Math.min(0.95, dragState.origY + dy));
                dragState.el.style.left = (dragState.data.x * 100) + '%';
                dragState.el.style.top  = (dragState.data.y * 100) + '%';
            }
            if (resizeState) {
                var rdx = (e.clientX - resizeState.startMouseX) / resizeState.containerW;
                resizeState.data.w = Math.max(0.05, resizeState.origW + rdx);
                resizeState.el.style.width = (resizeState.data.w * 100) + '%';
            }
            if (textWidthResizeState) {
                var tdx = (e.clientX - textWidthResizeState.startMouseX) / textWidthResizeState.containerW;
                textWidthResizeState.data.w = Math.max(0.05, textWidthResizeState.origW + tdx);
                textWidthResizeState.el.style.width = (textWidthResizeState.data.w * 100) + '%';
            }
        });

        document.addEventListener('mouseup', function (e) {
            if (dragState)   { document.body.style.userSelect = ''; dragState   = null; }
            if (resizeState) { 
                document.body.style.userSelect = ''; 
                resizeState = null; 
                setTimeout(() => { globalIsResizingFlag = false; }, 80);
            }
            if (textWidthResizeState) {
                document.body.style.userSelect = '';
                textWidthResizeState = null;
                setTimeout(() => { globalIsResizingFlag = false; }, 80);
            }
        });

        textLayer.addEventListener('mouseup', function () {
            if (currentTool !== 'highlight') return;
            var sel = window.getSelection();
            if (!sel.rangeCount || sel.isCollapsed) return;

            var range = sel.getRangeAt(0);
            var clientRects = range.getClientRects();
            var pageRect = pageContainer.getBoundingClientRect();

            var rects = [];
            for (var i = 0; i < clientRects.length; i++) {
                var r = clientRects[i];
                if (r.width < 1 || r.height < 1) continue;
                rects.push({
                    x: (r.left - pageRect.left) / pageRect.width,
                    y: (r.top  - pageRect.top)  / pageRect.height,
                    w: r.width  / pageRect.width,
                    h: r.height / pageRect.height,
                });
            }
            sel.removeAllRanges();
            if (rects.length === 0) return;

            getAnnotations(currentPage).highlights.push({ id: genId(), rects: rects, color: highlightColor });
            renderAnnotations(currentPage);
            updateAnnCount();
        });

        pageContainer.addEventListener('click', function (e) {
            if (currentTool !== 'text') return;
            if (e.target.closest('.text-annotation') || e.target.closest('.image-annotation')) return;
            if (e.target.closest('.text-input-overlay-box') || e.target.closest('.text-formatter-tooltip') || e.target.closest('.text-width-handle')) return;

            var rect = pageContainer.getBoundingClientRect();
            var relX = (e.clientX - rect.left) / rect.width;
            var relY = (e.clientY - rect.top)  / rect.height;

            var tempId = genId();
            var mockData = {
                id: tempId, x: relX, y: relY, content: '',
                font: 'Courier', size: 32, isBold: false, isItalic: false, color: '#1a73e8', w: 0.4
            };

            var inputWrapper = document.createElement('div');
            inputWrapper.className = 'text-annotation text-annotation-editing';
            inputWrapper.style.left = (relX * 100) + '%';
            inputWrapper.style.top = (relY * 100) + '%';
            inputWrapper.style.border = '1px dashed #1a73e8';
            inputWrapper.style.fontSize = (32 * scale) + 'px';
            inputWrapper.style.fontFamily = 'Courier';
            inputWrapper.style.width = '40%';

            var field = document.createElement('input');
            field.type = 'text';
            field.placeholder = 'Type here...';
            field.className = 'text-input-overlay-box';

            var handle = document.createElement('div');
            handle.className = 'text-width-handle';
            handle.style.display = 'block';
            handle.addEventListener('mousedown', function(ex) {
                ex.stopPropagation();
                ex.preventDefault();
                startTextWidthResize(ex, inputWrapper, mockData);
            });

            inputWrapper.appendChild(field);
            inputWrapper.appendChild(handle);
            annotationLayer.appendChild(inputWrapper);

            attachTextFormatterTooltip(inputWrapper, mockData, field);

            field.oninput = function() {
                inputWrapper.style.fontSize = (mockData.size * scale) + 'px'; 
                inputWrapper.style.fontFamily = mockData.font === 'Times' ? 'Times New Roman' : mockData.font;
                inputWrapper.style.fontWeight = mockData.isBold ? 'bold' : 'normal';
                inputWrapper.style.fontStyle = mockData.isItalic ? 'italic' : 'normal';
                inputWrapper.style.color = mockData.color;
            };

            requestAnimationFrame(() => { field.focus(); });

            function commitData() {
                var finalTxt = field.value.trim();
                inputWrapper.remove();
                if(finalTxt) {
                    mockData.content = finalTxt;
                    getAnnotations(currentPage).texts.push(mockData);
                }
                renderAnnotations(currentPage);
                updateAnnCount();
            }

            field.onblur = function() {
                setTimeout(() => {
                    if (document.activeElement === field || document.activeElement.closest('.text-formatter-tooltip')) return;
                    commitData();
                }, 150);
            };

            field.onkeydown = function(ev) {
                if(ev.key === 'Enter') commitData();
                if(ev.key === 'Escape') { inputWrapper.remove(); closeActiveTextOptions(); }
            };
        });

        pageContainer.addEventListener('click', function (e) {
            if (currentTool !== 'image') return;
            if (globalIsResizingFlag) return;
            if (e.target.closest('.text-annotation') || e.target.closest('.image-annotation')) return;

            var rect = pageContainer.getBoundingClientRect();
            imagePlacePos = {
                x: (e.clientX - rect.left) / rect.width,
                y: (e.clientY - rect.top)  / rect.height,
            };
            imageInput.click();
        });

        imageInput.addEventListener('change', function (e) {
            if (!e.target.files[0]) return;
            var file = e.target.files[0];
            if (!file.type.startsWith('image/')) return;

            var pos = { x: imagePlacePos.x, y: imagePlacePos.y };
            imageInput.value = '';         

            var reader = new FileReader();
            reader.onload = function (ev) {
                var src = ev.target.result;
                var img = new Image();
                img.onload = function () {
                    var pageW = pageContainer.offsetWidth;
                    var w = img.width / pageW;
                    var h = (img.height / img.width) * w;
                    if (w > 0.4) { w = 0.4; h = (img.height / img.width) * w; }

                    getAnnotations(currentPage).images.push({
                        id: genId(), x: pos.x, y: pos.y, w: w, h: h, src: src,
                    });
                    renderAnnotations(currentPage);
                    updateAnnCount();
                };
                img.src = src;
            };
            reader.readAsDataURL(file);
        });

        async function setZoom(newScale) {
            scale = Math.max(0.25, Math.min(4, newScale));
            zoomLabel.textContent = Math.round(scale * 100) + '%';
            if (pdfDoc) await renderPage(currentPage);
        }

        async function fitToWidth() {
            if (!pdfDoc) return;
            var page = await pdfDoc.getPage(currentPage);
            var vp = page.getViewport({ scale: 1 });
            var available = viewerArea.clientWidth - 80;
            scale = Math.max(0.25, Math.min(4, available / vp.width));
            zoomLabel.textContent = Math.round(scale * 100) + '%';
            await renderPage(currentPage);
        }

        document.getElementById('btn-zoom-in').addEventListener('click',  function () { setZoom(scale + 0.15); });
        document.getElementById('btn-zoom-out').addEventListener('click', function () { setZoom(scale - 0.15); });
        document.getElementById('btn-fit').addEventListener('click', fitToWidth);

        async function goToPage(num) {
            num = Math.max(1, Math.min(totalPages, parseInt(num) || 1));
            await renderPage(num);
        }

        document.getElementById('btn-prev').addEventListener('click', function () {
            if (currentPage > 1) goToPage(currentPage - 1);
        });
        document.getElementById('btn-next').addEventListener('click', function () {
            if (currentPage < totalPages) goToPage(currentPage + 1);
        });
        pageInputEl.addEventListener('change', function () { goToPage(pageInputEl.value); });

        document.getElementById('btn-clear-page').addEventListener('click', function () {
            annotations[currentPage] = { highlights: [], texts: [], images: [] };
            renderAnnotations(currentPage);
            updateAnnCount();
        });

        document.getElementById('btn-clear-all').addEventListener('click', function () {
            annotations = {};
            renderAnnotations(currentPage);
            updateAnnCount();
        });

        function extractCleanImageData(srcUrl) {
            return new Promise((resolve) => {
                if (srcUrl.startsWith('data:image/jpeg') || srcUrl.startsWith('data:image/png')) {
                    return resolve(srcUrl);
                }
                const tempImg = new Image();
                tempImg.crossOrigin = "anonymous";
                tempImg.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = tempImg.naturalWidth || tempImg.width;
                    canvas.height = tempImg.naturalHeight || tempImg.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(tempImg, 0, 0);
                    try {
                        resolve(canvas.toDataURL('image/png'));
                    } catch(err) {
                        resolve(srcUrl);
                    }
                };
                tempImg.onerror = () => resolve(srcUrl);
                tempImg.src = srcUrl;
            });
        }

        document.getElementById('btn-export').addEventListener('click', async function () {
            if (!base64BackupSource) {
                showToast('No valid source file loaded', 'error');
                return;
            }
            showToast('Merging annotation vector layer grids...', 'info');

            try {
                const binaryString = atob(base64BackupSource);
                const recoveryBytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    recoveryBytes[i] = binaryString.charCodeAt(i);
                }

                const targetPdfDoc = await PDFLib.PDFDocument.load(recoveryBytes);
                const pages = targetPdfDoc.getPages();

                for (let indexStr in annotations) {
                    const pageNum = parseInt(indexStr);
                    const targetPage = pages[pageNum - 1];
                    if (!targetPage) continue;

                    const { width, height } = targetPage.getSize();
                    const pageAnns = annotations[pageNum];

                    // Draw Highlights
                    if (pageAnns.highlights) {
                        for (let hl of pageAnns.highlights) {
                            const hex = hl.color.replace('#', '');
                            const r = parseInt(hex.substring(0, 2), 16) / 255;
                            const g = parseInt(hex.substring(2, 4), 16) / 255;
                            const b = parseInt(hex.substring(4, 6), 16) / 255;

                            for (let rect of hl.rects) {
                                targetPage.drawRectangle({
                                    x: rect.x * width,
                                    y: height - (rect.y * height) - (rect.h * height),
                                    width: rect.w * width,
                                    height: rect.h * height,
                                    color: PDFLib.rgb(r, g, b),
                                    opacity: 0.35,
                                });
                            }
                        }
                    }

                    // Draw Text (Fixed padding alignment)
                    if (pageAnns.texts) {
                        for (let txt of pageAnns.texts) {
                            let fontKey = PDFLib.StandardFonts.Courier;
                            if (txt.font === 'Helvetica') {
                                fontKey = txt.isBold ? (txt.isItalic ? PDFLib.StandardFonts.HelveticaBoldOblique : PDFLib.StandardFonts.HelveticaBold) : (txt.isItalic ? PDFLib.StandardFonts.HelveticaOblique : PDFLib.StandardFonts.Helvetica);
                            } else if (txt.font === 'Times') {
                                fontKey = txt.isBold ? (txt.isItalic ? PDFLib.StandardFonts.TimesRomanBoldItalic : PDFLib.StandardFonts.TimesRomanBold) : (txt.isItalic ? PDFLib.StandardFonts.TimesRomanItalic : PDFLib.StandardFonts.TimesRoman);
                            } else {
                                fontKey = txt.isBold ? (txt.isItalic ? PDFLib.StandardFonts.CourierBoldOblique : PDFLib.StandardFonts.CourierBold) : (txt.isItalic ? PDFLib.StandardFonts.CourierOblique : PDFLib.StandardFonts.Courier);
                            }
                            
                            const embeddedFont = await targetPdfDoc.embedFont(fontKey);
                            const hex = (txt.color || '#1a73e8').replace('#', '');
                            const r = parseInt(hex.substring(0, 2), 16) / 255;
                            const g = parseInt(hex.substring(2, 4), 16) / 255;
                            const b = parseInt(hex.substring(4, 6), 16) / 255;
                            
                            const fontSize = txt.size || 14;

                            targetPage.drawText(txt.content, {
                                x: (txt.x * width) + 5, // Account for left padding
                                y: height - (txt.y * height) - (fontSize * 1.15), // Adjust baseline for top padding
                                size: fontSize,
                                font: embeddedFont,
                                color: PDFLib.rgb(r, g, b),
                                maxWidth: txt.w ? (txt.w * width) : undefined
                            });
                        }
                    }

                    // Draw Images (Fixed aspect ratio stretch)
                    if (pageAnns.images) {
                        for (let imgObj of pageAnns.images) {
                            try {
                                const cleanImgSrc = await extractCleanImageData(imgObj.src);
                                
                                let embeddedImg = cleanImgSrc.includes('image/png') ? 
                                    await targetPdfDoc.embedPng(cleanImgSrc) : await targetPdfDoc.embedJpg(cleanImgSrc);

                                const imgDims = embeddedImg.scale(1);
                                const exportWidth = imgObj.w * width;
                                const exportHeight = (imgDims.height / imgDims.width) * exportWidth;

                                targetPage.drawImage(embeddedImg, {
                                    x: imgObj.x * width,
                                    y: height - (imgObj.y * height) - exportHeight,
                                    width: exportWidth,
                                    height: exportHeight,
                                });
                            } catch (e) { 
                                console.error("Image embedding failed, skipping element:", e); 
                            }
                        }
                    }
                }

                const finalBytes = await targetPdfDoc.save();
                const blob = new Blob([finalBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'annotated.pdf';
                a.click();
                showToast('Export successful!', 'success');
            } catch (err) {
                console.error(err);
                showToast('Failed to compile document binary.', 'error');
            }
        });

        viewerArea.addEventListener('click', function(e) {
            if(!e.target.closest('.text-annotation') && !e.target.closest('.text-formatter-tooltip')) {
                closeActiveTextOptions();
            }
        });

        document.addEventListener('keydown', function (e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
            switch (e.key.toLowerCase()) {
                case 'h': setTool('hand'); break;
                case 'l': setTool('highlight'); break;
                case 't': setTool('text'); break;
                case 'i': setTool('image'); break;
                case 'arrowleft': if (currentPage > 1) goToPage(currentPage - 1); break;
                case 'arrowright': if (currentPage < totalPages) goToPage(currentPage + 1); break;
            }
        });
    </script>
</body>
</html>
