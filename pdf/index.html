<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Annotator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --sidebar: #1a1a1a;
            --surface: #242424;
            --surface-2: #2e2e2e;
            --border: #333;
            --text: #e8e8e8;
            --text-muted: #777;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --accent-glow: rgba(245,158,11,0.12);
            --danger: #ef4444;
            --success: #22c55e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }

        /* Upload Screen */
        #upload-screen {
            position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
            background:var(--bg);
            background-image: radial-gradient(circle at 20% 50%, rgba(245,158,11,0.04) 0%, transparent 50%),
                              radial-gradient(circle at 80% 50%, rgba(239,68,68,0.03) 0%, transparent 50%);
        }
        .drop-zone {
            width:520px; max-width:90vw; padding:60px 40px; border:2px dashed var(--border); border-radius:20px;
            text-align:center; cursor:pointer; transition:all 0.3s ease; position:relative; overflow:hidden;
            background:var(--surface);
        }
        .drop-zone::before {
            content:''; position:absolute; inset:0; background:linear-gradient(135deg, var(--accent-glow), transparent);
            opacity:0; transition:opacity 0.3s;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color:var(--accent); transform:translateY(-2px);
            box-shadow:0 8px 40px rgba(245,158,11,0.08);
        }
        .drop-zone:hover::before, .drop-zone.drag-over::before { opacity:1; }
        .drop-zone i { font-size:48px; color:var(--accent); margin-bottom:20px; display:block; position:relative; }
        .drop-zone h2 { font-size:22px; font-weight:600; margin-bottom:8px; position:relative; }
        .drop-zone p { color:var(--text-muted); font-size:14px; position:relative; }
        .drop-zone .browse-btn {
            display:inline-block; margin-top:20px; padding:10px 28px; background:var(--accent);
            color:#000; font-weight:600; border-radius:10px; font-size:14px; position:relative;
            transition:background 0.2s;
        }
        .drop-zone .browse-btn:hover { background:var(--accent-hover); }

        /* Main Layout */
        #app { display:none; height:100vh; flex-direction:column; }
        #app.active { display:flex; }

        /* Toolbar */
        .toolbar {
            height:54px; background:var(--sidebar); border-bottom:1px solid var(--border);
            display:flex; align-items:center; padding:0 16px; gap:8px; flex-shrink:0;
        }
        .toolbar .logo { font-weight:700; font-size:16px; color:var(--accent); margin-right:16px; letter-spacing:-0.5px; }
        .toolbar .divider { width:1px; height:28px; background:var(--border); margin:0 8px; }
        .tb-btn {
            width:36px; height:36px; border:none; background:transparent; color:var(--text-muted);
            border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
            font-size:14px; transition:all 0.15s;
        }
        .tb-btn:hover { background:var(--surface-2); color:var(--text); }
        .tb-btn:active { transform:scale(0.93); }
        .tb-btn.disabled { opacity:0.3; pointer-events:none; }
        .page-input {
            width:48px; height:32px; text-align:center; background:var(--surface); border:1px solid var(--border);
            border-radius:6px; color:var(--text); font-family:inherit; font-size:13px; font-weight:500;
        }
        .page-input:focus { outline:none; border-color:var(--accent); }
        .zoom-label { font-size:12px; color:var(--text-muted); min-width:42px; text-align:center; font-weight:500; }
        .toolbar-right { margin-left:auto; display:flex; align-items:center; gap:6px; }

        /* Content */
        .content { display:flex; flex:1; overflow:hidden; }

        /* Sidebar */
        .sidebar {
            width:210px; background:var(--sidebar); border-right:1px solid var(--border);
            padding:16px 12px; display:flex; flex-direction:column; gap:6px; flex-shrink:0; overflow-y:auto;
        }
        .sidebar-section { margin-bottom:12px; }
        .sidebar-label { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:8px; font-weight:600; }
        .tool-btn {
            width:100%; padding:10px 12px; border:none; background:transparent; color:var(--text-muted);
            border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:10px; font-family:inherit;
            font-size:13px; font-weight:500; transition:all 0.15s; text-align:left;
        }
        .tool-btn:hover { background:var(--surface); color:var(--text); }
        .tool-btn.active { background:var(--accent-glow); color:var(--accent); border:1px solid rgba(245,158,11,0.2); }
        .tool-btn i { width:18px; text-align:center; font-size:14px; }
        .tool-btn .shortcut { margin-left:auto; font-size:10px; color:var(--text-muted); opacity:0.6; }

        .color-grid { display:flex; gap:6px; flex-wrap:wrap; }
        .color-swatch {
            width:28px; height:28px; border-radius:8px; border:2px solid transparent; cursor:pointer;
            transition:all 0.15s; position:relative;
        }
        .color-swatch:hover { transform:scale(1.1); }
        .color-swatch.active { border-color:var(--text); box-shadow:0 0 0 2px var(--bg); }
        .color-swatch.active::after {
            content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900;
            position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
            font-size:11px; color:#000;
        }

        .action-btn {
            width:100%; padding:9px 12px; border:1px solid var(--border); background:var(--surface);
            color:var(--text-muted); border-radius:8px; cursor:pointer; font-family:inherit;
            font-size:12px; font-weight:500; transition:all 0.15s; display:flex; align-items:center; gap:8px;
        }
        .action-btn:hover { border-color:var(--text-muted); color:var(--text); }
        .action-btn.danger:hover { border-color:var(--danger); color:var(--danger); }
        .action-btn i { width:16px; text-align:center; }

        /* Viewer */
        .viewer-area {
            flex:1; overflow:auto; display:flex; justify-content:center; padding:30px;
            background:var(--bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(245,158,11,0.02) 0%, transparent 60%);
        }
        .viewer-area::-webkit-scrollbar { width:8px; height:8px; }
        .viewer-area::-webkit-scrollbar-track { background:transparent; }
        .viewer-area::-webkit-scrollbar-thumb { background:var(--surface-2); border-radius:4px; }
        .viewer-area::-webkit-scrollbar-thumb:hover { background:var(--border); }

        .page-container {
            position:relative; box-shadow:0 4px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
            border-radius:4px; overflow:hidden; flex-shrink:0;
        }
        .page-container canvas { display:block; }

        /* Text Layer - PDF.js */
        .text-layer {
            position:absolute; text-align:initial; inset:0; overflow:hidden;
            opacity:0.22; line-height:1; -webkit-text-size-adjust:none; text-size-adjust:none;
            forced-color-adjust:none; transform-origin:0 0;
        }
        .text-layer :is(span, br) {
            color:transparent; position:absolute; white-space:pre; cursor:text; transform-origin:0% 0%;
        }
        .text-layer .markedContent { top:0; height:0; }
        .text-layer .endOfContent {
            display:block; position:absolute; inset:100% 0 0; z-index:-1; cursor:default; user-select:none;
        }
        .text-layer .endOfContent.active { top:0; }

        /* Selection colors per tool */
        .tool-highlight .text-layer ::selection { background:rgba(245,158,11,0.45); }
        .tool-highlight .text-layer { opacity:0.22; cursor:text; pointer-events:auto; }

        .tool-hand .text-layer,
        .tool-text .text-layer,
        .tool-image .text-layer { pointer-events:none; }

        .tool-text .page-container,
        .tool-image .page-container { cursor:crosshair; }
        .tool-hand .page-container { cursor:default; }

        /* Annotation Layer */
        .annotation-layer { position:absolute; inset:0; pointer-events:none; overflow:hidden; }

        /* Highlight annotations */
        .hl-rect {
            position:absolute; border-radius:2px; pointer-events:none;
            mix-blend-mode:multiply; transition:opacity 0.15s;
        }

        /* Text annotations */
        .text-annotation {
            position:absolute; pointer-events:auto; cursor:move; min-width:60px;
            background:rgba(15,15,15,0.92); border:1px solid var(--border); border-radius:8px;
            padding:10px 12px; font-size:13px; line-height:1.5; color:var(--text);
            backdrop-filter:blur(8px); max-width:280px; word-wrap:break-word;
            transition:box-shadow 0.15s;
        }
        .text-annotation:hover { box-shadow:0 4px 20px rgba(0,0,0,0.4); }
        .text-annotation .ann-delete {
            position:absolute; top:-10px; right:-10px; width:22px; height:22px; border-radius:50%;
            background:var(--danger); color:#fff; border:2px solid var(--bg); font-size:9px;
            cursor:pointer; display:none; align-items:center; justify-content:center;
        }
        .text-annotation:hover .ann-delete { display:flex; }
        .text-annotation .ann-edit {
            position:absolute; bottom:-10px; right:-10px; width:22px; height:22px; border-radius:50%;
            background:var(--accent); color:#000; border:2px solid var(--bg); font-size:9px;
            cursor:pointer; display:none; align-items:center; justify-content:center;
        }
        .text-annotation:hover .ann-edit { display:flex; }

        /* Image annotations */
        .image-annotation {
            position:absolute; pointer-events:auto; cursor:move; border:2px solid transparent;
            border-radius:6px; transition:border-color 0.15s;
        }
        .image-annotation:hover { border-color:var(--accent); }
        .image-annotation img { display:block; width:100%; height:100%; object-fit:fill; border-radius:4px; pointer-events:none; }
        .image-annotation .ann-delete {
            position:absolute; top:-10px; right:-10px; width:22px; height:22px; border-radius:50%;
            background:var(--danger); color:#fff; border:2px solid var(--bg); font-size:9px;
            cursor:pointer; display:none; align-items:center; justify-content:center;
        }
        .image-annotation:hover .ann-delete { display:flex; }
        .resize-handle {
            position:absolute; bottom:-6px; right:-6px; width:14px; height:14px;
            background:var(--accent); border-radius:3px; border:2px solid var(--bg);
            cursor:nwse-resize; display:none;
        }
        .image-annotation:hover .resize-handle { display:block; }

        /* Text input overlay */
        .text-input-overlay {
            position:absolute; min-width:160px; min-height:44px; padding:8px 10px;
            background:rgba(15,15,15,0.95); border:2px solid var(--accent); border-radius:8px;
            color:var(--text); font-family:inherit; font-size:13px; line-height:1.5;
            resize:both; z-index:100; outline:none; backdrop-filter:blur(8px);
            box-shadow:0 4px 24px rgba(245,158,11,0.15);
        }

        /* Toast */
        .toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
        .toast {
            padding:12px 20px; border-radius:10px; font-size:13px; font-weight:500;
            background:var(--surface-2); border:1px solid var(--border); color:var(--text);
            box-shadow:0 8px 30px rgba(0,0,0,0.4); display:flex; align-items:center; gap:10px;
            animation:toastIn 0.3s ease forwards;
        }
        .toast.out { animation:toastOut 0.3s ease forwards; }
        .toast i { font-size:14px; }
        .toast.success i { color:var(--success); }
        .toast.error i { color:var(--danger); }
        .toast.info i { color:var(--accent); }
        @keyframes toastIn { from { opacity:0; transform:translateY(16px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity:1; transform:translateY(0) scale(1); } to { opacity:0; transform:translateY(-8px) scale(0.95); } }

        .hidden-input { display:none; }

        /* Loading */
        .loading-overlay {
            position:absolute; inset:0; background:rgba(15,15,15,0.85); display:flex;
            align-items:center; justify-content:center; z-index:50; border-radius:4px;
        }
        .spinner {
            width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent);
            border-radius:50%; animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Annotation count badge */
        .ann-badge {
            display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px;
            padding:0 5px; border-radius:9px; background:var(--accent); color:#000; font-size:10px;
            font-weight:700; margin-left:auto;
        }

        @media(max-width:768px) {
            .sidebar { width:60px; padding:12px 6px; }
            .sidebar-label, .tool-btn span, .tool-btn .shortcut, .action-btn span { display:none; }
            .tool-btn { justify-content:center; padding:10px; }
            .tool-btn i { margin:0; }
            .color-grid { justify-content:center; }
            .action-btn { justify-content:center; padding:9px; }
            .action-btn i { margin:0; }
            .toolbar .logo span { display:none; }
        }

        @media(prefers-reduced-motion:reduce) {
            *, *::before, *::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
        }
    </style>
</head>
<body>
    <!-- Upload Screen -->
    <div id="upload-screen">
        <div class="drop-zone" id="drop-zone">
            <i class="fas fa-file-pdf"></i>
            <h2>Open PDF Document</h2>
            <p>Drag and drop your PDF here, or click to browse</p>
            <div class="browse-btn">Browse Files</div>
            <p style="margin-top:16px; font-size:12px; opacity:0.5;">Supports .pdf files</p>
            <input type="file" accept=".pdf,application/pdf" class="hidden-input" id="file-input">
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <div class="toolbar">
            <div class="logo"><i class="fas fa-file-pdf" style="margin-right:6px;"></i><span>PDF Annotator</span></div>
            <div class="divider"></div>
            <button class="tb-btn" id="btn-open" title="Open PDF"><i class="fas fa-folder-open"></i></button>
            <input type="file" accept=".pdf,application/pdf" class="hidden-input" id="file-input-2">
            <div class="divider"></div>
            <button class="tb-btn" id="btn-prev" title="Previous Page (Left Arrow)"><i class="fas fa-chevron-left"></i></button>
            <input type="number" class="page-input" id="page-input" value="1" min="1">
            <span style="font-size:13px; color:var(--text-muted);">/</span>
            <span style="font-size:13px; color:var(--text-muted);" id="total-pages">0</span>
            <button class="tb-btn" id="btn-next" title="Next Page (Right Arrow)"><i class="fas fa-chevron-right"></i></button>
            <div class="divider"></div>
            <button class="tb-btn" id="btn-zoom-out" title="Zoom Out (Ctrl+-)"><i class="fas fa-minus"></i></button>
            <span class="zoom-label" id="zoom-label">100%</span>
            <button class="tb-btn" id="btn-zoom-in" title="Zoom In (Ctrl++)"><i class="fas fa-plus"></i></button>
            <button class="tb-btn" id="btn-fit" title="Fit to Width (Ctrl+0)"><i class="fas fa-arrows-left-right"></i></button>
            <div class="toolbar-right">
                <span id="ann-count" style="font-size:11px; color:var(--text-muted); margin-right:6px;"></span>
                <button class="tb-btn" id="btn-export" title="Export Annotations as JSON"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <div class="content">
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-label">Tools</div>
                    <button class="tool-btn active" data-tool="hand"><i class="fas fa-hand"></i><span>Hand</span><span class="shortcut">H</span></button>
                    <button class="tool-btn" data-tool="highlight"><i class="fas fa-highlighter"></i><span>Highlight</span><span class="shortcut">L</span></button>
                    <button class="tool-btn" data-tool="text"><i class="fas fa-font"></i><span>Insert Text</span><span class="shortcut">T</span></button>
                    <button class="tool-btn" data-tool="image"><i class="fas fa-image"></i><span>Insert Image</span><span class="shortcut">I</span></button>
                </div>
                <div class="sidebar-section" id="highlight-colors-section" style="display:none;">
                    <div class="sidebar-label">Highlight Color</div>
                    <div class="color-grid" id="color-grid"></div>
                </div>
                <div class="sidebar-section" style="margin-top:auto;">
                    <div class="sidebar-label">Actions</div>
                    <button class="action-btn danger" id="btn-clear-page"><i class="fas fa-eraser"></i><span>Clear Page</span></button>
                    <button class="action-btn danger" id="btn-clear-all" style="margin-top:4px;"><i class="fas fa-trash"></i><span>Clear All</span></button>
                </div>
            </div>

            <div class="viewer-area tool-hand" id="viewer-area">
                <div class="page-container" id="page-container">
                    <canvas id="pdf-canvas"></canvas>
                    <div class="text-layer" id="text-layer"></div>
                    <div class="annotation-layer" id="annotation-layer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <input type="file" accept="image/*" class="hidden-input" id="image-input">

    <script>
        /* ===== PDF.js Worker ===== */
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        /* ===== Highlight color presets ===== */
        const HIGHLIGHT_COLORS = [
            { name: 'Yellow', color: '#fbbf24' },
            { name: 'Green',  color: '#4ade80' },
            { name: 'Blue',   color: '#60a5fa' },
            { name: 'Pink',   color: '#f472b6' },
            { name: 'Orange', color: '#fb923c' },
            { name: 'Purple', color: '#c084fc' },
        ];

        /* ===== Application state ===== */
        let pdfDoc    = null;
        let currentPage = 1;
        let totalPages  = 0;
        let scale       = 1.0;
        let currentTool = 'hand';
        let highlightColor = HIGHLIGHT_COLORS[0].color;
        let annotations = {};          // { pageNum: { highlights:[], texts:[], images:[] } }
        let nextId = 1;
        let isRendering = false;
        let pendingPage  = null;
        let dragState    = null;
        let resizeState  = null;
        let imagePlacePos = null;      // { x, y } in page-relative coords

        /* ===== DOM refs ===== */
        const uploadScreen    = document.getElementById('upload-screen');
        const dropZone        = document.getElementById('drop-zone');
        const fileInput       = document.getElementById('file-input');
        const fileInput2      = document.getElementById('file-input-2');
        const imageInput      = document.getElementById('image-input');
        const app             = document.getElementById('app');
        const viewerArea      = document.getElementById('viewer-area');
        const pageContainer   = document.getElementById('page-container');
        const pdfCanvas       = document.getElementById('pdf-canvas');
        const textLayer       = document.getElementById('text-layer');
        const annotationLayer = document.getElementById('annotation-layer');
        const pageInputEl     = document.getElementById('page-input');
        const totalPagesEl    = document.getElementById('total-pages');
        const zoomLabel       = document.getElementById('zoom-label');
        const colorGrid       = document.getElementById('color-grid');
        const toastContainer  = document.getElementById('toast-container');
        const annCountEl      = document.getElementById('ann-count');

        /* ===== Helpers ===== */
        function genId() { return 'ann_' + (nextId++); }

        function getAnnotations(page) {
            if (!annotations[page]) annotations[page] = { highlights: [], texts: [], images: [] };
            return annotations[page];
        }

        function countAllAnnotations() {
            return Object.values(annotations).reduce(
                (s, a) => s + a.highlights.length + a.texts.length + a.images.length, 0
            );
        }

        function updateAnnCount() {
            const n = countAllAnnotations();
            annCountEl.textContent = n > 0 ? n + ' annotation' + (n > 1 ? 's' : '') : '';
        }

        function showToast(message, type) {
            type = type || 'info';
            var icons = { info: 'fa-circle-info', success: 'fa-circle-check', error: 'fa-circle-xmark' };
            var t = document.createElement('div');
            t.className = 'toast ' + type;
            t.innerHTML = '<i class="fas ' + (icons[type] || icons.info) + '"></i>' + message;
            toastContainer.appendChild(t);
            setTimeout(function () {
                t.classList.add('out');
                setTimeout(function () { t.remove(); }, 300);
            }, 2800);
        }

        /* ===== Build color swatches ===== */
        function buildColorGrid() {
            colorGrid.innerHTML = '';
            HIGHLIGHT_COLORS.forEach(function (c) {
                var s = document.createElement('div');
                s.className = 'color-swatch' + (c.color === highlightColor ? ' active' : '');
                s.style.background = c.color;
                s.title = c.name;
                s.addEventListener('click', function () {
                    highlightColor = c.color;
                    colorGrid.querySelectorAll('.color-swatch').forEach(function (el) { el.classList.remove('active'); });
                    s.classList.add('active');
                });
                colorGrid.appendChild(s);
            });
        }
        buildColorGrid();

        /* ===== Tool switching ===== */
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(function (b) {
                b.classList.toggle('active', b.dataset.tool === tool);
            });
            viewerArea.className = 'viewer-area tool-' + tool;
            document.getElementById('highlight-colors-section').style.display =
                tool === 'highlight' ? '' : 'none';
            // Close any open text input
            var existing = pageContainer.querySelector('.text-input-overlay');
            if (existing) existing.blur();
        }

        document.querySelectorAll('.tool-btn').forEach(function (btn) {
            btn.addEventListener('click', function () { setTool(btn.dataset.tool); });
        });
        setTool('hand');

        /* =========================================================
           PDF LOADING
           ========================================================= */
        async function loadPDF(data) {
            try {
                pdfDoc = await pdfjsLib.getDocument({ data: data }).promise;
                totalPages  = pdfDoc.numPages;
                currentPage = 1;
                annotations = {};
                nextId      = 1;

                totalPagesEl.textContent = totalPages;
                pageInputEl.max = totalPages;
                pageInputEl.value = 1;

                uploadScreen.style.display = 'none';
                app.classList.add('active');

                await fitToWidth();
                showToast('Loaded ' + totalPages + ' page' + (totalPages > 1 ? 's' : ''), 'success');
            } catch (e) {
                console.error(e);
                showToast('Failed to load PDF', 'error');
            }
        }

        function handleFile(file) {
            if (!file || file.type !== 'application/pdf') {
                showToast('Please select a valid PDF file', 'error');
                return;
            }
            var reader = new FileReader();
            reader.onload = function (e) { loadPDF(new Uint8Array(e.target.result)); };
            reader.readAsArrayBuffer(file);
        }

        /* ===== Upload events ===== */
        dropZone.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function (e) { if (e.target.files[0]) handleFile(e.target.files[0]); });
        fileInput2.addEventListener('change', function (e) { if (e.target.files[0]) handleFile(e.target.files[0]); });
        document.getElementById('btn-open').addEventListener('click', function () { fileInput2.click(); });

        dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
        dropZone.addEventListener('drop', function (e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        /* =========================================================
           PAGE RENDERING  (fixes deprecated textContent → textContentSource,
                              and sets --scale-factor CSS var)
           ========================================================= */
        async function renderPage(num) {
            if (isRendering) { pendingPage = num; return; }
            isRendering = true;

            var loader = pageContainer.querySelector('.loading-overlay');
            if (!loader) {
                loader = document.createElement('div');
                loader.className = 'loading-overlay';
                loader.innerHTML = '<div class="spinner"></div>';
                pageContainer.appendChild(loader);
            }
            loader.style.display = 'flex';

            try {
                var page     = await pdfDoc.getPage(num);
                var viewport = page.getViewport({ scale: scale });

                /* Canvas */
                pdfCanvas.width  = viewport.width;
                pdfCanvas.height = viewport.height;
                var ctx = pdfCanvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                /* Text layer — use textContentSource (new API) */
                textLayer.innerHTML = '';
                textLayer.style.width  = viewport.width + 'px';
                textLayer.style.height = viewport.height + 'px';
                textLayer.style.setProperty('--scale-factor', String(viewport.scale));

                var textContent = await page.getTextContent();
                var textDivs = [];
                pdfjsLib.renderTextLayer({
                    textContentSource: textContent,   // ← fixed deprecation
                    container: textLayer,
                    viewport: viewport,
                    textDivs: textDivs,
                });

                /* Re-draw annotations for this page */
                renderAnnotations(num);

                /* Update UI */
                pageInputEl.value = num;
                currentPage = num;
                updateAnnCount();

                viewerArea.scrollTop  = 0;
                viewerArea.scrollLeft = 0;
            } catch (e) {
                console.error('Render error:', e);
            }

            loader.style.display = 'none';
            isRendering = false;
            if (pendingPage !== null) { var p = pendingPage; pendingPage = null; renderPage(p); }
        }

        /* =========================================================
           ANNOTATION RENDERING
           ========================================================= */
        function renderAnnotations(pageNum) {
            annotationLayer.innerHTML = '';
            var anns = getAnnotations(pageNum);

            /* Highlights */
            anns.highlights.forEach(function (hl) {
                hl.rects.forEach(function (r) {
                    var div = document.createElement('div');
                    div.className = 'hl-rect';
                    div.style.left   = (r.x * 100) + '%';
                    div.style.top    = (r.y * 100) + '%';
                    div.style.width  = (r.w * 100) + '%';
                    div.style.height = (r.h * 100) + '%';
                    div.style.background = hl.color;
                    div.style.opacity = '0.38';
                    annotationLayer.appendChild(div);
                });
            });

            /* Text annotations */
            anns.texts.forEach(function (t) { createTextElement(t); });

            /* Image annotations */
            anns.images.forEach(function (img) { createImageElement(img); });
        }

        /* --- Text annotation DOM element --- */
        function createTextElement(data) {
            var el = document.createElement('div');
            el.className = 'text-annotation';
            el.dataset.id = data.id;
            el.style.left    = (data.x * 100) + '%';
            el.style.top     = (data.y * 100) + '%';
            el.style.maxWidth = Math.max(60, data.maxW * 100) + '%';
            el.textContent = data.content;

            var del = document.createElement('button');
            del.className = 'ann-delete';
            del.innerHTML = '<i class="fas fa-xmark"></i>';
            del.addEventListener('click', function (e) { e.stopPropagation(); deleteAnnotation(data.id); });
            el.appendChild(del);

            var edit = document.createElement('button');
            edit.className = 'ann-edit';
            edit.innerHTML = '<i class="fas fa-pen"></i>';
            edit.addEventListener('click', function (e) { e.stopPropagation(); startEditText(data); });
            el.appendChild(edit);

            el.addEventListener('mousedown', function (e) {
                if (e.target.closest('.ann-delete') || e.target.closest('.ann-edit')) return;
                e.stopPropagation();
                startDrag(e, el, data, 'text');
            });

            annotationLayer.appendChild(el);
            return el;
        }

        /* --- Image annotation DOM element --- */
        function createImageElement(data) {
            var el = document.createElement('div');
            el.className = 'image-annotation';
            el.dataset.id = data.id;
            el.style.left  = (data.x * 100) + '%';
            el.style.top   = (data.y * 100) + '%';
            el.style.width = (data.w * 100) + '%';

            var img = document.createElement('img');
            img.src = data.src;
            img.alt = 'Inserted image';
            img.draggable = false;
            el.appendChild(img);

            var del = document.createElement('button');
            del.className = 'ann-delete';
            del.innerHTML = '<i class="fas fa-xmark"></i>';
            del.addEventListener('click', function (e) { e.stopPropagation(); deleteAnnotation(data.id); });
            el.appendChild(del);

            var rh = document.createElement('div');
            rh.className = 'resize-handle';
            rh.addEventListener('mousedown', function (e) { e.stopPropagation(); startResize(e, el, data); });
            el.appendChild(rh);

            el.addEventListener('mousedown', function (e) {
                if (e.target.closest('.ann-delete') || e.target.closest('.resize-handle')) return;
                e.stopPropagation();
                startDrag(e, el, data, 'image');
            });

            annotationLayer.appendChild(el);
            return el;
        }

        /* ===== Delete annotation ===== */
        function deleteAnnotation(id) {
            var anns = getAnnotations(currentPage);
            anns.highlights = anns.highlights.filter(function (h) { return h.id !== id; });
            anns.texts      = anns.texts.filter(function (t) { return t.id !== id; });
            anns.images     = anns.images.filter(function (i) { return i.id !== id; });
            renderAnnotations(currentPage);
            updateAnnCount();
            showToast('Annotation removed', 'info');
        }

        /* =========================================================
           DRAG & RESIZE
           ========================================================= */
        function startDrag(e, el, data, type) {
            var rect = pageContainer.getBoundingClientRect();
            dragState = {
                el: el, data: data, type: type,
                startMouseX: e.clientX,
                startMouseY: e.clientY,
                origX: data.x,
                origY: data.y,
                containerW: rect.width,
                containerH: rect.height,
            };
            document.body.style.userSelect = 'none';
        }

        function startResize(e, el, data) {
            var rect = pageContainer.getBoundingClientRect();
            resizeState = {
                el: el, data: data,
                startMouseX: e.clientX,
                origW: data.w,
                containerW: rect.width,
            };
            document.body.style.userSelect = 'none';
        }

        document.addEventListener('mousemove', function (e) {
            if (dragState) {
                var dx = (e.clientX - dragState.startMouseX) / dragState.containerW;
                var dy = (e.clientY - dragState.startMouseY) / dragState.containerH;
                dragState.data.x = Math.max(0, Math.min(0.95, dragState.origX + dx));
                dragState.data.y = Math.max(0, Math.min(0.95, dragState.origY + dy));
                dragState.el.style.left = (dragState.data.x * 100) + '%';
                dragState.el.style.top  = (dragState.data.y * 100) + '%';
            }
            if (resizeState) {
                var rdx = (e.clientX - resizeState.startMouseX) / resizeState.containerW;
                resizeState.data.w = Math.max(0.05, resizeState.origW + rdx);
                resizeState.el.style.width = (resizeState.data.w * 100) + '%';
            }
        });

        document.addEventListener('mouseup', function () {
            if (dragState)   { document.body.style.userSelect = ''; dragState   = null; }
            if (resizeState) { document.body.style.userSelect = ''; resizeState = null; }
        });

        /* =========================================================
           HIGHLIGHT TOOL
           ========================================================= */
        textLayer.addEventListener('mouseup', function () {
            if (currentTool !== 'highlight') return;

            var sel = window.getSelection();
            if (!sel.rangeCount || sel.isCollapsed) return;

            var range       = sel.getRangeAt(0);
            var clientRects = range.getClientRects();
            var pageRect    = pageContainer.getBoundingClientRect();

            var rects = [];
            for (var i = 0; i < clientRects.length; i++) {
                var r = clientRects[i];
                if (r.width < 1 || r.height < 1) continue;
                rects.push({
                    x: (r.left   - pageRect.left) / pageRect.width,
                    y: (r.top    - pageRect.top)  / pageRect.height,
                    w: r.width  / pageRect.width,
                    h: r.height / pageRect.height,
                });
            }
            sel.removeAllRanges();

            if (rects.length === 0) return;

            var id = genId();
            getAnnotations(currentPage).highlights.push({ id: id, rects: rects, color: highlightColor });
            renderAnnotations(currentPage);
            updateAnnCount();
            showToast('Text highlighted', 'success');
        });

        /* =========================================================
           TEXT INSERTION TOOL
           ========================================================= */
        pageContainer.addEventListener('click', function (e) {
            if (currentTool !== 'text') return;
            if (e.target.closest('.text-annotation') || e.target.closest('.image-annotation')) return;
            if (e.target.closest('.text-input-overlay')) return;

            var rect = pageContainer.getBoundingClientRect();
            var relX = (e.clientX - rect.left) / rect.width;
            var relY = (e.clientY - rect.top)  / rect.height;
            startNewText(relX, relY);
        });

        function startNewText(x, y) {
            var ta = document.createElement('textarea');
            ta.className = 'text-input-overlay';
            ta.style.left = (x * 100) + '%';
            ta.style.top  = (y * 100) + '%';
            ta.placeholder = 'Type your text here...';
            annotationLayer.appendChild(ta);

            requestAnimationFrame(function () { ta.focus(); });

            function finish() {
                var content = ta.value.trim();
                ta.remove();
                if (!content) return;

                var id = genId();
                getAnnotations(currentPage).texts.push({ id: id, x: x, y: y, content: content, maxW: 0.3 });
                renderAnnotations(currentPage);
                updateAnnCount();
                showToast('Text added', 'success');
            }

            ta.addEventListener('blur', finish);
            ta.addEventListener('keydown', function (e) {
                if (e.key === 'Escape')              { ta.value = ''; ta.blur(); }
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ta.blur(); }
            });
        }

        function startEditText(data) {
            var existing = pageContainer.querySelector('.text-input-overlay');
            if (existing) existing.remove();

            var ta = document.createElement('textarea');
            ta.className = 'text-input-overlay';
            ta.style.left    = (data.x * 100) + '%';
            ta.style.top     = (data.y * 100) + '%';
            ta.style.maxWidth = (data.maxW * 100) + '%';
            ta.value = data.content;
            annotationLayer.appendChild(ta);

            requestAnimationFrame(function () {
                ta.focus();
                ta.setSelectionRange(ta.value.length, ta.value.length);
            });

            function finish() {
                var content = ta.value.trim();
                ta.remove();
                if (!content) { deleteAnnotation(data.id); return; }
                data.content = content;
                renderAnnotations(currentPage);
                showToast('Text updated', 'success');
            }

            ta.addEventListener('blur', finish);
            ta.addEventListener('keydown', function (e) {
                if (e.key === 'Escape')              { ta.blur(); }
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ta.blur(); }
            });
        }

        /* =========================================================
           IMAGE INSERTION TOOL  (fixed: save pos before nulling)
           ========================================================= */
        pageContainer.addEventListener('click', function (e) {
            if (currentTool !== 'image') return;
            if (e.target.closest('.text-annotation') || e.target.closest('.image-annotation')) return;

            var rect = pageContainer.getBoundingClientRect();
            /* Save a COPY of the position — imageInput change is async */
            imagePlacePos = {
                x: (e.clientX - rect.left) / rect.width,
                y: (e.clientY - rect.top)  / rect.height,
            };
            imageInput.click();
        });

        imageInput.addEventListener('change', function (e) {
            if (!e.target.files[0]) { imagePlacePos = null; return; }

            var file = e.target.files[0];
            if (!file.type.startsWith('image/')) {
                showToast('Please select a valid image file', 'error');
                imagePlacePos = null;
                return;
            }

            /* *** FIX: capture position NOW, before async callbacks *** */
            var pos = { x: imagePlacePos.x, y: imagePlacePos.y };
            imagePlacePos = null;          // clear immediately
            imageInput.value = '';         // reset so same file can be re-selected

            var reader = new FileReader();
            reader.onload = function (ev) {
                var src = ev.target.result;
                var img = new Image();

                img.onload = function () {
                    /* pos is guaranteed non-null here */
                    var pageW = pageContainer.offsetWidth;
                    var w = img.width / pageW;
                    var h = (img.height / img.width) * w;
                    if (w > 0.4) { w = 0.4; h = (img.height / img.width) * w; }

                    var id = genId();
                    getAnnotations(currentPage).images.push({
                        id: id, x: pos.x, y: pos.y, w: w, h: h, src: src,
                    });
                    renderAnnotations(currentPage);
                    updateAnnCount();
                    showToast('Image inserted', 'success');
                };

                img.onerror = function () {
                    showToast('Failed to load image', 'error');
                };

                img.src = src;
            };

            reader.onerror = function () {
                showToast('Failed to read image file', 'error');
            };

            reader.readAsDataURL(file);
        });

        /* =========================================================
           ZOOM
           ========================================================= */
        async function setZoom(newScale) {
            scale = Math.max(0.25, Math.min(4, newScale));
            zoomLabel.textContent = Math.round(scale * 100) + '%';
            if (pdfDoc) await renderPage(currentPage);
        }

        async function fitToWidth() {
            if (!pdfDoc) return;
            var page = await pdfDoc.getPage(currentPage);
            var vp = page.getViewport({ scale: 1 });
            var available = viewerArea.clientWidth - 80;
            scale = Math.max(0.25, Math.min(4, available / vp.width));
            zoomLabel.textContent = Math.round(scale * 100) + '%';
            await renderPage(currentPage);
        }

        document.getElementById('btn-zoom-in').addEventListener('click',  function () { setZoom(scale + 0.15); });
        document.getElementById('btn-zoom-out').addEventListener('click', function () { setZoom(scale - 0.15); });
        document.getElementById('btn-fit').addEventListener('click', fitToWidth);

        viewerArea.addEventListener('wheel', function (e) {
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                setZoom(scale + (e.deltaY > 0 ? -0.1 : 0.1));
            }
        }, { passive: false });

        /* =========================================================
           PAGE NAVIGATION
           ========================================================= */
        async function goToPage(num) {
            num = Math.max(1, Math.min(totalPages, parseInt(num) || 1));
            await renderPage(num);
        }

        document.getElementById('btn-prev').addEventListener('click', function () {
            if (currentPage > 1) goToPage(currentPage - 1);
        });
        document.getElementById('btn-next').addEventListener('click', function () {
            if (currentPage < totalPages) goToPage(currentPage + 1);
        });
        pageInputEl.addEventListener('change', function () { goToPage(pageInputEl.value); });
        pageInputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); goToPage(pageInputEl.value); }
        });

        /* =========================================================
           CLEAR / EXPORT
           ========================================================= */
        document.getElementById('btn-clear-page').addEventListener('click', function () {
            var anns = getAnnotations(currentPage);
            var count = anns.highlights.length + anns.texts.length + anns.images.length;
            if (count === 0) { showToast('No annotations on this page', 'info'); return; }
            annotations[currentPage] = { highlights: [], texts: [], images: [] };
            renderAnnotations(currentPage);
            updateAnnCount();
            showToast('Cleared ' + count + ' annotation' + (count > 1 ? 's' : ''), 'info');
        });

        document.getElementById('btn-clear-all').addEventListener('click', function () {
            var count = countAllAnnotations();
            if (count === 0) { showToast('No annotations to clear', 'info'); return; }
            annotations = {};
            renderAnnotations(currentPage);
            updateAnnCount();
            showToast('Cleared all ' + count + ' annotation' + (count > 1 ? 's' : ''), 'info');
        });

        document.getElementById('btn-export').addEventListener('click', function () {
            var count = countAllAnnotations();
            if (count === 0) { showToast('No annotations to export', 'info'); return; }

            /* Strip large base64 image data, keep metadata */
            var exportData = {};
            for (var pg in annotations) {
                exportData[pg] = {
                    highlights: annotations[pg].highlights,
                    texts:      annotations[pg].texts,
                    images:     annotations[pg].images.map(function (img) {
                        return { id: img.id, x: img.x, y: img.y, w: img.w, h: img.h, hasImage: true };
                    }),
                };
            }

            var blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            var url  = URL.createObjectURL(blob);
            var a    = document.createElement('a');
            a.href     = url;
            a.download = 'pdf-annotations.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported ' + count + ' annotation' + (count > 1 ? 's' : ''), 'success');
        });

        /* =========================================================
           KEYBOARD SHORTCUTS
           ========================================================= */
        document.addEventListener('keydown', function (e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;

            switch (e.key.toLowerCase()) {
                case 'h': setTool('hand');      break;
                case 'l': setTool('highlight');  break;
                case 't': setTool('text');       break;
                case 'i': setTool('image');      break;
                case 'arrowleft':
                    if (currentPage > 1) goToPage(currentPage - 1);
                    break;
                case 'arrowright':
                    if (currentPage < totalPages) goToPage(currentPage + 1);
                    break;
                case '+': case '=':
                    if (e.ctrlKey || e.metaKey) { e.preventDefault(); setZoom(scale + 0.15); }
                    break;
                case '-':
                    if (e.ctrlKey || e.metaKey) { e.preventDefault(); setZoom(scale - 0.15); }
                    break;
                case '0':
                    if (e.ctrlKey || e.metaKey) { e.preventDefault(); fitToWidth(); }
                    break;
            }
        });

        /* Prevent native image drag */
        document.addEventListener('dragstart', function (e) {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });
    </script>
</body>
</html>
